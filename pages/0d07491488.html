<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補助代碼提問 — 長照智慧諮詢</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--danger:#ef4444;--success:#16a34a;--radius:12px;
  /* CARD-042 同步 count token：進度條配色 */
  --b1-color:#3b82f6;--b2-color:#10b981;--b3-color:#f59e0b;--b4-color:#8b5cf6;
  --warn:#f59e0b;--warn-light:#fef3c7
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:24px;border-radius:var(--radius);margin-bottom:20px;text-align:center}
header h1{font-size:1.4em;margin-bottom:4px;letter-spacing:1px}
header .subtitle{font-size:.85em;opacity:.85}
.cards-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:24px}
@media (max-width:1024px){.cards-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:768px){.cards-grid{grid-template-columns:1fr}}
.query-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s;display:flex;flex-direction:column}
.query-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.query-card .card-header{background:var(--primary-light);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.query-card .code-badge{background:var(--primary);color:#fff;font-size:.78em;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.5px;flex-shrink:0}
.query-card .code-badge.unknown{background:var(--muted)}
.query-card .code-name{font-size:.92em;font-weight:600;color:var(--text);line-height:1.4;flex:1;min-width:0;word-break:break-all}
.query-card .card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column}
.query-card textarea{width:100%;min-height:120px;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88em;line-height:1.6;resize:vertical;background:#f8fafc;transition:border-color .15s,background .15s}
.query-card textarea:focus{outline:none;border-color:var(--primary);background:#fff}
.query-card textarea::placeholder{color:var(--muted);font-size:.88em}
.query-card .char-count{font-size:.75em;color:var(--muted);margin-top:6px;text-align:right;font-variant-numeric:tabular-nums}
.actions{display:flex;justify-content:center;padding:16px 0 24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:10px;border:none;font-size:1em;font-weight:700;cursor:pointer;text-decoration:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.2)}
.btn-primary:hover:not(:disabled){background:#15803d;transform:translateY(-1px)}
.btn-primary:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none}
.status-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 24px;margin:24px auto;max-width:600px;text-align:center;display:none}
.status-box.active{display:block}
.status-box.success{border-color:var(--success)}
.status-box.error{border-color:var(--danger)}
.status-box h2{font-size:1.3em;margin-bottom:12px}
.status-box.success h2{color:var(--success)}
.status-box.error h2{color:var(--danger)}
.status-box p{color:var(--muted);margin-bottom:16px}
.status-box .retry-btn{background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit}
.status-box .retry-btn:hover{background:var(--primary-dark)}
.empty-state{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted)}
footer{text-align:center;padding:20px;font-size:.78em;color:var(--muted);border-top:1px solid var(--border);margin-top:20px}
/* === CARD-042：status banner + 迷你進度條（不占版面 — 1 行）=== */
.status-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.78em}
.status-banner .sb-tag{background:var(--primary-light);color:var(--primary);padding:2px 9px;border-radius:16px;font-weight:600;white-space:nowrap;font-size:.92em}
.status-banner .sb-tag.warn{background:var(--warn-light);color:#854d0e}
.status-banner .sb-label{color:var(--muted);margin-right:3px}
.mini-quota-bars{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;font-size:.72em}
.mini-quota-bars .mq-chip{display:inline-flex;align-items:center;gap:5px;padding:2px 6px;border-radius:4px;background:#f1f5f9}
.mini-quota-bars .mq-dot{width:8px;height:8px;border-radius:50%}
.mini-quota-bars .mq-dot.b1{background:var(--b1-color)}
.mini-quota-bars .mq-dot.b2{background:var(--b2-color)}
.mini-quota-bars .mq-dot.b3{background:var(--b3-color)}
.mini-quota-bars .mq-dot.b4{background:var(--b4-color)}
.mini-quota-bars .mq-nums{color:var(--muted);font-variant-numeric:tabular-nums}
.mini-quota-bars .mq-nums.over{color:var(--danger);font-weight:700}
</style>
</head>
<body>
<div id="main-content" class="container">
  <header>
    <h1>🔍 補助代碼提問</h1>
    <div class="subtitle">共 <strong>0</strong> 項補助・請為每項描述家屬需求</div>
  </header>

  <!-- CARD-042：status banner + 迷你進度條（URL query 帶才顯示）-->
  <div id="status-banner" class="status-banner" style="display:none"></div>
  <div id="mini-quota-bars" class="mini-quota-bars" style="display:none"></div>

  
  <div class="empty-state">
    <p>⚠️ 未帶入任何代碼，請從 Discord 重新選擇。</p>
  </div>
  

  <div id="status-success" class="status-box success">
    <h2>✅ 已送出</h2>
    <p>請回 Discord 查看結果頻道。</p>
  </div>

  <div id="status-error" class="status-box error">
    <h2>❌ 送出失敗</h2>
    <p id="error-detail">網路錯誤，請稍後再試。</p>
    <button class="retry-btn" onclick="retrySubmit()">🔁 再試一次</button>
  </div>

  <footer>
    <p>長照智慧諮詢 · 本頁面由系統自動生成 · POC 版本</p>
  </footer>
</div>

<script>
(function(){
  "use strict";
  var USER_ID = "";
  var WEBHOOK = "";
  var submitBtn = document.getElementById("submit-btn");
  var successBox = document.getElementById("status-success");
  var errorBox = document.getElementById("status-error");
  var errorDetail = document.getElementById("error-detail");
  var mainContent = document.getElementById("main-content");

  function getTextareas() {
    return Array.prototype.slice.call(document.querySelectorAll(".query-card textarea"));
  }

  function updateSubmitState() {
    var areas = getTextareas();
    if (!areas.length) {
      if (submitBtn) submitBtn.disabled = true;
      return;
    }
    var allFilled = areas.every(function(t){ return t.value.trim().length > 0; });
    if (submitBtn) submitBtn.disabled = !allFilled;
  }

  function bindTextareas() {
    var areas = getTextareas();
    areas.forEach(function(t){
      var counter = t.parentElement.querySelector(".char-count .count");
      t.addEventListener("input", function(){
        if (counter) counter.textContent = String(t.value.length);
        updateSubmitState();
      });
    });
  }

  function collectQueries() {
    var cards = document.querySelectorAll(".query-card");
    var queries = [];
    cards.forEach(function(c){
      var code = c.getAttribute("data-code");
      var name = c.getAttribute("data-name");
      var ta = c.querySelector("textarea");
      var question = ta ? ta.value.trim() : "";
      queries.push({code: code, name: name, question: question});
    });
    return queries;
  }

  var SESSION = "";
  var CHANNEL = "";
  var ISSUED_AT = 0;   // CARD-035：session TTL 判斷用

  function buildPayload() {
    return {
      user_id: USER_ID,
      session: SESSION,
      channel: CHANNEL,
      issued_at: ISSUED_AT,   // CARD-035
      queries: collectQueries()
    };
  }

  function showSuccess() {
    if (mainContent) mainContent.querySelector(".cards-grid") && (mainContent.querySelector(".cards-grid").style.display = "none");
    if (mainContent) mainContent.querySelector(".actions") && (mainContent.querySelector(".actions").style.display = "none");
    successBox.classList.add("active");
    errorBox.classList.remove("active");
  }

  function showError(msg) {
    errorDetail.textContent = msg || "網路錯誤，請稍後再試。";
    errorBox.classList.add("active");
    successBox.classList.remove("active");
  }

  function doSubmit() {
    if (submitBtn.disabled) return;
    submitBtn.disabled = true;
    submitBtn.textContent = "⏳ 送出中…";
    var payload = buildPayload();

    if (!WEBHOOK) {
      console.warn("[CARD-032 POC] 未帶 webhook，printing payload：", payload);
      showSuccess();
      return;
    }

    fetch(WEBHOOK, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    })
    .then(function(res){
      // CARD-035：讀 JSON body 以拿到 error_code/error_msg
      return res.json().then(function(body){ return {status: res.status, body: body}; });
    })
    .then(function(r){
      if (r.body && r.body.ok) { showSuccess(); return; }
      // 後端 4xx/5xx 結構化錯誤
      var code = (r.body && r.body.error_code) || ("HTTP_" + r.status);
      var msg = (r.body && r.body.error_msg) || "未知錯誤";
      if (code === "session_expired") {
        showError("⏱ 連線已過期，請回 Discord 重按「🔍 選補助代碼查產品」重新開啟。");
      } else if (code === "pdpa_blocked") {
        showError("⚠️ " + msg);
      } else {
        showError("[" + code + "] " + msg);
      }
      submitBtn.disabled = false;
      submitBtn.textContent = "🔍 查詢商品";
    })
    .catch(function(err){
      console.error("[CARD-035] submit failed", err);
      showError("網路錯誤：" + String(err.message || err));
      submitBtn.disabled = false;
      submitBtn.textContent = "🔍 查詢商品";
    });
  }

  window.retrySubmit = function() {
    errorBox.classList.remove("active");
    submitBtn.disabled = false;
    submitBtn.textContent = "🔍 查詢商品";
    updateSubmitState();
  };

  // URL param 讀取：codes / user_id / session / channel / webhook
  // （CARD-034：擴 4 個 param；codes 若 SSR items 為空則動態 build cards）
  function readCodeNameMap() {
    try {
      var el = document.getElementById("code-name-map");
      if (!el) return {};
      return JSON.parse(el.textContent || "{}");
    } catch(e) { return {}; }
  }

  function buildCardFromCode(code, mapping) {
    var known = Object.prototype.hasOwnProperty.call(mapping, code);
    var name = known ? mapping[code] : "";
    var card = document.createElement("div");
    card.className = "query-card";
    card.setAttribute("data-code", code);
    card.setAttribute("data-name", name);

    var header = document.createElement("div");
    header.className = "card-header";
    var badge = document.createElement("span");
    badge.className = known ? "code-badge" : "code-badge unknown";
    badge.textContent = code;
    var nameSpan = document.createElement("span");
    nameSpan.className = "code-name";
    nameSpan.textContent = known ? name : ("\u4EE3\u78BC " + code + " \uFF08\u672A\u77E5\uFF09");
    header.appendChild(badge);
    header.appendChild(nameSpan);

    var body = document.createElement("div");
    body.className = "card-body";
    var ta = document.createElement("textarea");
    ta.name = "q-" + code;
    ta.placeholder = "例如：80 歲男性，輕微偏癱，住公寓 4 樓無電梯…";
    ta.maxLength = 200;
    ta.rows = 5;
    ta.setAttribute("data-code", code);
    var cc = document.createElement("div");
    cc.className = "char-count";
    var ccInner = document.createElement("span");
    ccInner.className = "count";
    ccInner.textContent = "0";
    cc.appendChild(ccInner);
    cc.appendChild(document.createTextNode(" / 200"));
    body.appendChild(ta);
    body.appendChild(cc);

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  function hydrateFromUrlCodes() {
    var grid = document.getElementById("cards-grid");
    if (!grid) {
      // SSR 無 grid（empty state）：根據 URL 代碼建立 grid
      var hasCards = false;
    } else {
      var hasCards = grid.querySelectorAll(".query-card").length > 0;
    }
    if (hasCards) return false;
    try {
      var params = new URLSearchParams(window.location.search);
      var codesStr = params.get("codes") || "";
      var codes = codesStr.split(",").map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
      if (!codes.length) return false;
      var mapping = readCodeNameMap();

      // 有 empty-state 要移除；無 grid 要新建
      var empty = document.querySelector(".empty-state");
      if (empty && empty.parentNode) empty.parentNode.removeChild(empty);

      if (!grid) {
        grid = document.createElement("div");
        grid.className = "cards-grid";
        grid.id = "cards-grid";
        var header = document.querySelector("header");
        if (header && header.parentNode) {
          header.parentNode.insertBefore(grid, header.nextSibling);
        } else {
          document.getElementById("main-content").appendChild(grid);
        }
      }

      codes.forEach(function(c){ grid.appendChild(buildCardFromCode(c, mapping)); });

      // 補 submit button（若不存在）
      if (!document.getElementById("submit-btn")) {
        var actions = document.createElement("div");
        actions.className = "actions";
        actions.innerHTML = '<button id="submit-btn" class="btn btn-primary" disabled>🔍 查詢商品</button>';
        grid.parentNode.insertBefore(actions, grid.nextSibling);
        submitBtn = document.getElementById("submit-btn");
      }

      // 更新 header 的「共 N 項」
      var subtitle = document.querySelector("header .subtitle");
      if (subtitle) {
        subtitle.innerHTML = '共 <strong>' + codes.length + '</strong> 項補助・請為每項描述家屬需求';
      }
      return true;
    } catch(e) { return false; }
  }

  try {
    var params = new URLSearchParams(window.location.search);
    if (params.has("user_id")) USER_ID = params.get("user_id");
    if (params.has("session")) SESSION = params.get("session");
    if (params.has("channel")) CHANNEL = params.get("channel");
    if (params.has("webhook")) WEBHOOK = params.get("webhook");
    if (params.has("issued_at")) {
      var n = parseInt(params.get("issued_at"), 10);
      ISSUED_AT = isNaN(n) ? 0 : n;
    }
    /* CARD-042：status banner + mini quota bars（URL query 帶才顯示）*/
    renderStatusBanner(params);
    renderMiniQuotaBars(params);
  } catch(e) {}

  hydrateFromUrlCodes();
  bindTextareas();
  updateSubmitState();
  if (submitBtn) submitBtn.addEventListener("click", doSubmit);

  /* CARD-042：Web B status banner（橫幅徽章）*/
  function renderStatusBanner(params) {
    var box = document.getElementById("status-banner");
    if (!box) return;
    var entries = [];
    if (params.has("cms")) entries.push({label:"CMS", val:"第 "+params.get("cms")+" 級"});
    if (params.has("income")) {
      var m = {low:"低收入戶", mid_low:"中低收入戶", general:"一般戶"};
      var inc = params.get("income");
      entries.push({label:"收入別", val: m[inc] || inc});
    }
    if (params.has("city")) entries.push({label:"縣市", val:params.get("city")});
    if (params.has("zone")) entries.push({label:"分區", val:"第 "+params.get("zone")+" 類"});
    if (params.has("foreign_care")) {
      var fc = params.get("foreign_care") === "true" || params.get("foreign_care") === "1";
      entries.push({label:"外看", val: fc ? "有" : "無", warn: fc});
    }
    if (!entries.length) { box.style.display = "none"; return; }
    box.style.display = "flex";
    box.innerHTML = "";
    entries.forEach(function(e) {
      var tag = document.createElement("span");
      tag.className = "sb-tag" + (e.warn ? " warn" : "");
      tag.innerHTML = '<span class="sb-label">' + e.label + '</span>' + e.val;
      box.appendChild(tag);
    });
  }

  /* CARD-042：Web B 迷你進度條（單行 chip 式，不占版面）*/
  function renderMiniQuotaBars(params) {
    var box = document.getElementById("mini-quota-bars");
    if (!box) return;
    var keys = ["b1", "b2", "b3", "b4"];
    var chips = [];
    keys.forEach(function(k) {
      var quota = parseInt(params.get(k + "_quota") || "", 10);
      var used = parseInt(params.get(k + "_used") || "0", 10);
      var remaining = parseInt(params.get(k + "_remaining") || "", 10);
      if (isNaN(quota) || quota <= 0) return;
      if (isNaN(remaining)) remaining = Math.max(0, quota - used);
      var over = used > quota;
      chips.push({k: k, used: used, quota: quota, remaining: remaining, over: over});
    });
    if (!chips.length) { box.style.display = "none"; return; }
    box.style.display = "flex";
    box.innerHTML = "";
    chips.forEach(function(c) {
      var chip = document.createElement("span");
      chip.className = "mq-chip";
      chip.innerHTML =
        '<span class="mq-dot ' + c.k + '"></span>' +
        '<strong>' + c.k.toUpperCase() + '</strong>' +
        ' <span class="mq-nums' + (c.over ? ' over' : '') + '">' +
          c.used.toLocaleString() + '/' + c.quota.toLocaleString() +
        '</span>';
      box.appendChild(chip);
    });
  }
})();
</script>
</body>
</html>
