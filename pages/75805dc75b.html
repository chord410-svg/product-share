<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選擇補助代碼 — 長照智慧諮詢</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--danger:#ef4444;--success:#16a34a;--radius:12px;
  /* CARD-042：count 美術 token — type chip + 進度條 4 色 */
  --chip-buy-bg:#dcfce7;--chip-buy-fg:#166534;
  --chip-rent-bg:#fef3c7;--chip-rent-fg:#854d0e;
  --chip-both-bg:#dbeafe;--chip-both-fg:#1e40af;
  --b1-color:#3b82f6;--b2-color:#10b981;--b3-color:#f59e0b;--b4-color:#8b5cf6;
  --warn:#f59e0b;--warn-light:#fef3c7
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px 16px 120px}
header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:20px 24px;border-radius:var(--radius);margin-bottom:16px;text-align:center}
header h1{font-size:1.3em;margin-bottom:4px;letter-spacing:1px}
header .subtitle{font-size:.85em;opacity:.85}
.toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar .counter{font-size:.9em;color:var(--muted)}
.toolbar .counter strong{color:var(--primary);font-size:1.05em}
.toolbar button{padding:7px 14px;font-size:.82em;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit}
.toolbar button:hover{background:var(--primary-light);border-color:var(--primary)}
.sections-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:24px}
@media (max-width:1024px){.sections-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:768px){.sections-grid{grid-template-columns:1fr}.container{padding-bottom:100px}}
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column}
.sec-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px;gap:8px}
.sec-header h2{font-size:.95em;color:var(--primary-dark);font-weight:700;flex:1;min-width:0}
.sec-header .sec-actions{display:flex;gap:4px}
.sec-header .sec-actions button{font-size:.72em;padding:3px 8px;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:4px;cursor:pointer;font-family:inherit}
.sec-header .sec-actions button:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.sec-header .sec-count{font-size:.75em;color:var(--muted);white-space:nowrap}
.sec-header .sec-count.has{color:var(--success);font-weight:700}
.items{display:flex;flex-direction:column;gap:2px;max-height:260px;overflow-y:auto}
/* CARD-054：D / S / OT 大區暫無資料時顯示佔位字（CARD-056 處理） */
.items:empty::before{content:"📋 待補資料（CARD-056 處理中）";color:#999;font-size:.85em;display:block;padding:10px;font-style:italic}
/* CARD-058g：6 包預設摺疊 wrapper — Codex 補強 .bucket-wrapper 維持 058d progress bar grid-column:1/-1 在 wrapper 內生效 */
.bucket-wrapper{display:grid;grid-template-columns:1fr;margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-sizing:border-box}
.bucket-wrapper > summary{list-style:none;cursor:pointer;user-select:none}
.bucket-wrapper > summary::-webkit-details-marker{display:none}
.bucket-wrapper > summary::before{content:"▶ ";color:var(--muted);font-size:.8em;margin-right:4px;transition:transform .2s;display:inline-block}
.bucket-wrapper[open] > summary::before{content:"▼ "}
/* CARD-058g：6 大包配色（標頭背景漸層 + border-left 4px 強調色）— 對齊 058d 進度條配色 */
.bucket-summary[data-bucket="B1"]{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-left:4px solid #3b82f6;box-sizing:border-box}
.bucket-summary[data-bucket="B2"]{background:linear-gradient(135deg,#fef3c7,#fde68a);border-left:4px solid #f59e0b;box-sizing:border-box}
.bucket-summary[data-bucket="B3"]{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-left:4px solid #10b981;box-sizing:border-box}
.bucket-summary[data-bucket="B4"]{background:linear-gradient(135deg,#f3e8ff,#e9d5ff);border-left:4px solid #a855f7;box-sizing:border-box}
.bucket-summary[data-bucket="S"]{background:linear-gradient(135deg,#cffafe,#a5f3fc);border-left:4px solid #06b6d4;box-sizing:border-box}
.bucket-summary[data-bucket="OT"]{background:linear-gradient(135deg,#f3f4f6,#e5e7eb);border-left:4px solid #9ca3af;box-sizing:border-box}
/* CARD-058c：bucket-summary 主行 — 058g 移除 grid-column:1/-1（已在 details wrapper 不需要）+ margin/border 改 wrapper 控管 */
.bucket-summary{display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:10px 14px}
.bucket-summary .bs-title{font-size:.95em;font-weight:700;color:var(--primary-dark);flex:1;min-width:0}
.bucket-summary .bs-title .bs-tag{font-family:"SF Mono",Menlo,monospace;font-size:.85em;background:var(--primary);color:#fff;padding:1px 7px;border-radius:4px;margin-right:6px;letter-spacing:.5px}
/* CARD-058d：包別碼（BC/D/EF/G 包）對齊 epizy 視覺 */
.bucket-summary .bs-title .bs-pkg{color:var(--muted);font-weight:600;margin-right:6px;font-size:.92em}
/* CARD-058d：bucket-summary 進度條（4 包各色漸層 + over 紅；NOTE 不放） */
.bucket-summary .bucket-progress{position:relative;flex-basis:100%;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden;margin-top:4px}
.bucket-summary .bp-fill{height:100%;border-radius:5px;transition:width .35s;width:0%}
.bucket-summary .bp-fill.bp-b1{background:linear-gradient(90deg,#3b82f6,#1e40af)}
.bucket-summary .bp-fill.bp-b2{background:linear-gradient(90deg,#f59e0b,#d97706)}
.bucket-summary .bp-fill.bp-b3{background:linear-gradient(90deg,#10b981,#059669)}
.bucket-summary .bp-fill.bp-b4{background:linear-gradient(90deg,#a855f7,#7e22ce)}
.bucket-summary .bp-fill.over{background:linear-gradient(90deg,#ef4444,#b91c1c)!important}
.bucket-summary .bp-pct{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:.7em;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;text-shadow:0 0 3px #fff}
.bucket-summary .ss-cell{white-space:nowrap;font-variant-numeric:tabular-nums;font-size:.85em;min-width:120px;text-align:right}
.bucket-summary .ss-cell .ss-label{color:var(--muted);margin-right:4px}
.bucket-summary .ss-cell .ss-val{font-weight:700;color:var(--text)}
.bucket-summary .ss-cell.coshare .ss-val{color:var(--danger)}
.bucket-summary .ss-cell.remaining .ss-val{color:var(--success)}
.bucket-summary .ss-cell.remaining .ss-val.zero{color:var(--danger)}
.bucket-summary .ss-cell.remaining .ss-val.muted{color:var(--muted);font-weight:600}
/* CARD-058g：058c 的 .placeholder/.note-only 背景與 border 覆蓋已移除（data-bucket 配色優先；只保留文案色彩） */
.bucket-summary.note-only{font-style:italic}
.bucket-summary.note-only .bs-title,.bucket-summary.note-only .ss-note{color:#854d0e}
.bucket-summary.placeholder .ss-note{color:#666;font-weight:600}
@media (max-width:768px){
  .bucket-summary{flex-direction:column;align-items:flex-start;gap:6px;padding:8px 10px}
  .bucket-summary .bs-title{font-size:.88em}
  .bucket-summary .ss-cell{font-size:.78em;min-width:auto;text-align:left}
}
/* CARD-058e：S/OT 解鎖（058c 鎖回退）— stepper 可點、自付/進度條啟用；既有 .sec[data-bucket=note] 鎖樣式整段移除 */
/* CARD-058e：S 包進度條粉藍漸層（仿 epizy 視覺）；OT 包不放進度條 */
.bucket-summary .bp-fill.bp-s{background:linear-gradient(90deg,#06b6d4,#0891b2)}
.bucket-summary .bp-fill.bp-ot{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
/* CARD-058g：點包展開後 .bucket-content 內細項區 grid 3 欄並排 */
.bucket-content{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding:12px;background:#fafbfc;box-sizing:border-box}
@media (max-width:1024px){.bucket-content{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:768px){.bucket-content{grid-template-columns:1fr}}
/* CARD-058g：sticky quota 改 epizy 表格樣式（4 欄 × 6 row + sticky 掛外層 div 不掛 table/tr） */
.quota-table{width:100%;border-collapse:collapse;font-size:.78em;background:var(--card);box-sizing:border-box}
.quota-table thead{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff}
.quota-table thead th{padding:6px 8px;text-align:right;font-weight:600;font-size:.92em;letter-spacing:.3px}
.quota-table thead th:first-child{text-align:left}
.quota-table tbody tr{border-bottom:1px solid var(--border)}
.quota-table tbody tr:last-child{border-bottom:none}
.quota-table tbody td{padding:5px 8px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
.quota-table tbody td:first-child{text-align:left;font-weight:600}
.quota-table tbody tr[data-bucket="B1"] td:first-child{border-left:3px solid #3b82f6;padding-left:6px}
.quota-table tbody tr[data-bucket="B2"] td:first-child{border-left:3px solid #f59e0b;padding-left:6px}
.quota-table tbody tr[data-bucket="B3"] td:first-child{border-left:3px solid #10b981;padding-left:6px}
.quota-table tbody tr[data-bucket="B4"] td:first-child{border-left:3px solid #a855f7;padding-left:6px}
.quota-table tbody tr[data-bucket="S"] td:first-child{border-left:3px solid #06b6d4;padding-left:6px}
.quota-table tbody tr[data-bucket="OT"] td:first-child{border-left:3px solid #9ca3af;padding-left:6px}
.quota-table tbody td.qt-coshare{color:var(--danger);font-weight:600}
.quota-table tbody td.qt-remaining{color:var(--success);font-weight:600}
.quota-table tbody td.qt-remaining.qt-zero{color:var(--danger)}
.quota-table tbody td.qt-muted{color:var(--muted)}
@media (max-width:768px){.quota-table{font-size:.72em}.quota-table thead th,.quota-table tbody td{padding:4px 5px}}
/* CARD-058e：S/OT 警示橫幅（取代 058c 的「補助規則洽縣市政府」） */
.bucket-summary.warn-estimate .bs-warn{flex-basis:100%;color:#854d0e;font-size:.78em;font-style:italic;line-height:1.4}
.bucket-summary.warn-estimate .ss-val::before{content:"[暫估] ";color:#854d0e;font-size:.85em;font-weight:600;font-style:italic}
.itm{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(0,0,0,.04);transition:background .12s}
.itm:last-child{border-bottom:none}
.itm:hover{background:var(--primary-light)}
.itm .i-body{flex:1;min-width:0}
.itm .i-code{font-size:1.05em;font-weight:600;color:var(--primary-dark);font-family:"SF Mono",Menlo,Monaco,monospace;letter-spacing:.5px}/* CARD-056b：code 字放大粗體（個管師習慣以碼別溝通） */
.itm .i-name{font-size:.85em;line-height:1.4}
.itm.checked{background:var(--primary-light)}
.itm.checked .i-name{font-weight:600;color:var(--primary-dark)}
/* CARD-053a：epizy 風格 stepper（class 名與 epizy DOM 對齊） */
.div_price_count{display:flex;align-items:center;gap:8px;flex-shrink:0}
.div_price_count .div_CI_price{font-size:.78em;color:var(--success);font-weight:600;min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
.div_price_count .div_CI_price .span_CI_price{display:inline-block}
.div_price_count.no-price .div_CI_price{color:var(--muted)}
.div_counter{display:inline-flex;align-items:center;background:#f1f5f9;border-radius:6px;padding:2px}
.div_counter .btn{width:28px;height:28px;border:none;background:#e2e8f0;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;border-radius:4px;font-family:inherit;padding:0;line-height:1}
.div_counter .btn_minus:hover,.div_counter .btn_plus:hover{background:var(--primary-light);color:var(--primary)}
.div_counter .btn:active{background:var(--primary);color:#fff}
.div_counter .txt_CI_qty{width:36px;height:24px;border:1px solid var(--border);background:#fff;text-align:center;font-size:13px;font-weight:600;font-family:inherit;margin:0 4px;padding:0;border-radius:4px;color:var(--text)}
.div_counter .txt_CI_qty:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.div_price_count .no-price-note{font-size:.68em;color:var(--muted);margin-left:4px}
.footer-bar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;justify-content:center;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:20}
.footer-bar-inner{max-width:1200px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.footer-bar .footer-bar-stats{display:flex;flex-direction:column;gap:4px;min-width:0;flex:1}
.footer-bar .sum{font-size:.9em;color:var(--muted)}
.footer-bar .sum strong{color:var(--primary);font-size:1.05em}
/* CARD-053a：footer 兩行估算（並排不混算，前綴必含「估算」字樣） */
.footer-bar .estimate-row{display:flex;flex-wrap:wrap;gap:14px;font-size:.82em;color:var(--muted)}
.footer-bar .estimate-row strong{font-variant-numeric:tabular-nums;font-weight:700}
.footer-bar .estimate-row .estimate-buy strong{color:var(--success)}
.footer-bar .estimate-row .estimate-rent strong{color:#854d0e}
@media (max-width:560px){.footer-bar .estimate-row{flex-direction:column;gap:2px}}
.next-btn{padding:12px 28px;border-radius:10px;border:none;font-size:.98em;font-weight:700;cursor:pointer;background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.2);transition:all .15s;font-family:inherit}
.next-btn:hover:not(:disabled){background:#15803d;transform:translateY(-1px)}
.next-btn:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none}
footer.page-footer{text-align:center;padding:20px 0 100px;font-size:.78em;color:var(--muted)}
/* === CARD-042：status banner + 進度條 + 租賃 UI === */
.status-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:.82em}
.status-banner .sb-tag{background:var(--primary-light);color:var(--primary);padding:3px 10px;border-radius:20px;font-weight:600;font-size:.92em;white-space:nowrap}
.status-banner .sb-tag.warn{background:var(--warn-light);color:#854d0e}
.status-banner .sb-label{color:var(--muted);margin-right:4px}
.quota-bars{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;position:sticky;top:6px;z-index:9;box-shadow:0 2px 6px rgba(0,0,0,.03)}
.quota-bars .qb-title{font-size:.78em;color:var(--muted);margin-bottom:8px;font-weight:600}
.quota-bars .qb-row{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;margin-bottom:6px;font-size:.75em}
.quota-bars .qb-row:last-child{margin-bottom:0}
.quota-bars .qb-label{font-weight:700}
.quota-bars .qb-label.b1{color:var(--b1-color)}
.quota-bars .qb-label.b2{color:var(--b2-color)}
.quota-bars .qb-label.b3{color:var(--b3-color)}
.quota-bars .qb-label.b4{color:var(--b4-color)}
.quota-bars .qb-bar{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;position:relative}
.quota-bars .qb-fill{height:100%;border-radius:4px;transition:width .3s}
.quota-bars .qb-fill.b1{background:var(--b1-color)}
.quota-bars .qb-fill.b2{background:var(--b2-color)}
.quota-bars .qb-fill.b3{background:var(--b3-color)}
.quota-bars .qb-fill.b4{background:var(--b4-color)}
.quota-bars .qb-fill.over{background:var(--danger)!important}
.quota-bars .qb-nums{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.itm .price-row{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:.72em;flex-wrap:wrap}
.itm .price-chip{padding:1px 6px;border-radius:4px;font-weight:600;letter-spacing:.3px}
.itm .price-chip.buy{background:var(--chip-buy-bg);color:var(--chip-buy-fg)}
.itm .price-chip.rent{background:var(--chip-rent-bg);color:var(--chip-rent-fg)}
.itm .price-chip.both{background:var(--chip-both-bg);color:var(--chip-both-fg)}
/* CARD-052：service 型（BA/BB/BC/BD/C/G）chip 樣式——中性灰，與 buy/rent/both 區分但不搶眼 */
.itm .price-chip.service{background:#f1f5f9;color:#475569}
.itm .rent-switch{display:inline-flex;gap:6px;margin-left:4px}
.itm .rent-switch label{display:inline-flex;align-items:center;gap:2px;cursor:pointer;font-size:.95em;color:var(--muted)}
.itm .rent-switch input[type="radio"]{accent-color:var(--primary);cursor:pointer}
.single-approval-note{text-align:center;margin:12px 0 4px;padding:10px 14px;background:var(--warn-light);color:#854d0e;border:1px dashed #f59e0b;border-radius:8px;font-size:.78em;line-height:1.6}
.single-approval-note strong{color:#b45309}
/* CARD-058f：案主條件 3 下拉（CMS / 個案身分 / 服務限制）即時重算 */
.case-conditions{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:.85em;box-sizing:border-box}
.case-conditions .cc-row{display:flex;align-items:center;gap:6px;flex:1;min-width:200px}
.case-conditions label{color:var(--muted);font-weight:600;white-space:nowrap}
.case-conditions select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:.95em;font-family:inherit;cursor:pointer;flex:1;min-width:0}
.case-conditions select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.case-conditions .cc-warn{flex-basis:100%;color:#854d0e;font-size:.78em;font-style:italic;margin-top:2px;display:none}
.case-conditions.has-multi-identity .cc-warn{display:block}
@media (max-width:768px){.case-conditions{flex-direction:column;align-items:stretch}.case-conditions .cc-row{min-width:auto}}
/* CARD-058-modal：點 code 跳 modal 顯官方說明 */
.modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
.modal[hidden]{display:none!important}
.modal .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);cursor:pointer}
.modal .modal-dialog{position:relative;max-width:600px;width:100%;background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.25);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-sizing:border-box}
.modal .modal-header{position:sticky;top:0;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:14px 48px 14px 18px;border-bottom:1px solid var(--border);z-index:1}
.modal .modal-title{margin:0;font-size:1.1em;font-weight:700;line-height:1.4}
.modal .modal-close{position:absolute;top:8px;right:8px;border:none;background:rgba(255,255,255,.15);color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.4em;cursor:pointer;line-height:1;font-weight:700}
.modal .modal-close:hover{background:rgba(255,255,255,.3)}
.modal .modal-body{padding:18px;overflow-y:auto;font-size:.92em;line-height:1.7;color:var(--text);flex:1}
.modal .modal-body section{margin-bottom:14px}
.modal .modal-body section:last-child{margin-bottom:0}
.modal .modal-body section h3{font-size:.95em;color:var(--primary-dark);margin:0 0 6px;font-weight:700;padding-left:8px;border-left:3px solid var(--primary)}
.modal .modal-body section p{margin:0;white-space:pre-wrap;color:var(--text)}
.modal .modal-body section ul{margin:0;padding-left:22px}
.modal .modal-body section ul li{margin-bottom:4px}
.modal .modal-body .muted{color:var(--muted);font-style:italic;text-align:center;padding:20px 0}
.modal .modal-source{padding:10px 18px;border-top:1px solid var(--border);font-size:.7em;color:var(--muted);background:#f8fafc}

<div class="container">
  <header>
    <h1>🔍 選擇補助代碼</h1>
    <div class="subtitle">請勾選要查詢的補助項目，可跨族多選</div>
  </header>

  <!-- CARD-042：status banner（CMS/收入/縣市/zone/外看）-->
  <div id="status-banner" class="status-banner" style="display:none"></div>

  <!-- CARD-058f：案主條件 3 下拉（CMS / 個案身分 / 服務限制）— 改下拉即時 ripple 全頁額度重算 -->
  <div id="case-conditions" class="case-conditions">
    <div class="cc-row">
      <label for="cc-cms">照顧需求等級</label>
      <select id="cc-cms" aria-label="CMS 照顧需求等級">
        <option value="2">第 2 級</option>
        <option value="3">第 3 級</option>
        <option value="4">第 4 級</option>
        <option value="5">第 5 級</option>
        <option value="6">第 6 級</option>
        <option value="7">第 7 級</option>
        <option value="8">第 8 級</option>
      </select>
    </div>
    <div class="cc-row">
      <label for="cc-income">個案身分</label>
      <select id="cc-income" aria-label="個案身分">
        <option value="general">一般戶</option>
        <option value="mid_low">中低收入戶</option>
        <option value="low">第一類（社福或長照低收入戶）</option>
      </select>
    </div>
    <div class="cc-row">
      <label for="cc-identity">個案服務限制條件</label>
      <select id="cc-identity" aria-label="個案服務限制條件">
        <option value="">無</option>
        <option value="foreign_caregiver">有外籍看護</option>
        <option value="indigenous">原住民</option>
      </select>
    </div>
    <div class="cc-warn" id="cc-warn-multi">⚠️ URL 含多項身分標記，本介面僅顯第一個，需多選請手動編輯 URL</div>
  </div>

  <!-- CARD-042 + CARD-058g：sticky 額度表格（4 欄 × 6 row 對齊 epizy 樣式；sticky 掛外層 div 不掛 table/tr） -->
  <div id="quota-bars" class="quota-bars">
    <div class="qb-title">💰 額度使用概況（總覽）</div>
    <table class="quota-table">
      <thead>
        <tr><th>服務項目</th><th>自付額</th><th>已使用額</th><th>餘額</th></tr>
      </thead>
      <tbody id="quota-bars-body"></tbody>
    </table>
  </div>

  <div class="toolbar">
    <div class="counter">已選 <strong id="counter">0</strong> 項</div>
    <div>
      <!-- CARD-058g：拿掉「全部展開 / 全部收合」按鈕（details 自帶展開 toggle） -->
      <button type="button" id="btn-clear-all">全部清除</button>
    </div>
  </div>

  <div id="sections"></div>

  <!-- CARD-042：單次核定降級為文字提醒（114 JSON 無 max_per_approval 欄位，CARD-041 確認）-->
  <div class="single-approval-note">
    ⚠️ <strong>單次核定上限提醒</strong>：
    同一勾選批次建議不超過 1 組輔具組合送出（實際核定依照服務項目規定為準）。
    本介面不做自動限制，請個管師自行判斷。
  </div>
</div>

<div class="footer-bar">
  <div class="footer-bar-inner">
    <div class="footer-bar-stats">
      <div class="sum">已選 <strong id="counter-bottom">0</strong> 項補助</div>
      <!-- CARD-058c：footer 雙行估算移除（與 per-bucket summary 資訊重複）；保留「已選 N 項」counter -->
    </div>
    <button id="next-btn" class="next-btn" type="button" disabled>下一步 →</button>
  </div>
</div>

<footer class="page-footer">
  <p>長照智慧諮詢 · 補助代碼選擇 · POC 版本</p>
</footer>

/* CARD-044 + CARD-054：BB/BC/BD/C 維持 prepend；G 改 push（移到末端，修正 CARD-044 把 G 卡在 EA 前的 bug）。
   注入失敗 / 空陣列 → 不報錯，CATS 保持原樣。 */
try {
  const extraEl=document.getElementById("extra-sections");
  if(extraEl){
    const raw=extraEl.textContent||"[]";
    const extras=JSON.parse(raw);
    if(Array.isArray(extras)&&extras.length){
      // 正規化 entry 形狀（兼容 {id,name,items:[{c,n}]}）
      const normalized=extras.filter(s=>s&&s.id&&Array.isArray(s.items)).map(s=>({
        id:s.id, name:s.name||s.id,
        items:s.items.filter(i=>i&&i.c&&i.n).map(i=>({c:i.c,n:i.n}))
      }));
      // CARD-054 + CARD-056：G/S/OT push 到末端，其餘（BA/BB/BC/BD/C）prepend 到最前
      const APPEND_IDS=new Set(["G","S","OT"]);
      const appendExtras=normalized.filter(s=>APPEND_IDS.has(s.id));
      const otherExtras=normalized.filter(s=>!APPEND_IDS.has(s.id));
      if(otherExtras.length)CATS.splice(0,0,...otherExtras);// BA/BB/BC/BD/C → 最前
      if(appendExtras.length)CATS.push(...appendExtras);// G/S/OT → 末端（依 _EXTRA_SECTIONS_META 順序：G, S, OT）
    }
  }
}catch(e){/* swallow：CARD-044 注入失敗不影響 9 族 */}
// CARD-056：S / OT 改由 renderer 從 service_codes_{s,ot}.json 注入（CARD-054 hardcode 空 entry 已移除避免 duplicate detector warn）；
// D 區仍由 hardcode 空 entry 佔位（DA01 屬 user_input pricing，CARD-058 處理）。

function parseParams(){
  const u=new URLSearchParams(location.search);
  P={
    user_id:u.get("user_id")||"",
    session:u.get("session")||"",
    channel:u.get("channel")||"",
    guild:u.get("guild")||"",
    // CARD-035：webhook（Web B fetch 目標）+ issued_at（session TTL）
    webhook:u.get("webhook")||"",
    issued_at:u.get("issued_at")||"",
    // CARD-042：URL query 帶橫幅 + 進度條資料
    cms:u.get("cms")||"",
    income:u.get("income")||"",
    city:u.get("city")||"",
    zone:u.get("zone")||"",
    foreign_care:u.get("foreign_care")||"",
    // CARD-058：identity canonical flags（comma-list：foreign_caregiver,indigenous,...）
    identity:u.get("identity")||"",
    b1_quota:u.get("b1_quota")||"",b1_used:u.get("b1_used")||"",b1_remaining:u.get("b1_remaining")||"",
    b2_quota:u.get("b2_quota")||"",b2_used:u.get("b2_used")||"",b2_remaining:u.get("b2_remaining")||"",
    b3_quota:u.get("b3_quota")||"",b3_used:u.get("b3_used")||"",b3_remaining:u.get("b3_remaining")||"",
    b4_quota:u.get("b4_quota")||"",b4_used:u.get("b4_used")||"",b4_remaining:u.get("b4_remaining")||"",
    // CARD-058e：S 包 quota（URL 沒帶 → 走 SUBSIDY.S.default_quota=87780 fallback）
    s_quota:u.get("s_quota")||""
  };
  // CARD-058：URLSearchParams.has() 區分 undefined / 0（未帶入額度 vs 已用完）
  // CARD-058f-fix：改為查 P 物件本身（delete P.b*_quota 後即時生效，不依賴 init 時的 URLSearchParams）
  P._has=function(k){return Object.prototype.hasOwnProperty.call(P,k)&&P[k]!=null&&P[k]!=="";};
}

/* CARD-058g：sticky quota-bars 改 epizy 表格樣式（4 欄 × 6 row + 即時刷 spent/coshare/remaining） */
const _QUOTA_TABLE_ROWS=[
  {bucket:"B1",label:"照顧及專業服務(BC項)"},
  {bucket:"B2",label:"交通接送(D項)"},// label 會依 city/zone 補
  {bucket:"B3",label:"輔具及無障礙環境改善服務(EF項)"},
  {bucket:"B4",label:"喘息服務(G項)"},
  {bucket:"S", label:"短期替代照顧服務(S項)"},
  {bucket:"OT",label:"營養餐飲服務(OT項)"}
];
// CARD-058b：依 dCity/dDistrict 對 city_zones 查詢 zone（優先）；fallback P.zone（058f 案主條件 URL 帶值）
// CARD-058b-fix2：districts 欄位（全 22 縣市 × 368 區）優先；remote_districts（既有偏遠對照）fallback
function _resolveDZone(){
  if(dCity){
    const cityRec=(CITY_ZONES.cities||[]).find(c=>c.city===dCity);
    if(cityRec){
      if(dDistrict){
        // CARD-058b-fix2：優先讀 districts（全 22 縣市補齊）
        if(Array.isArray(cityRec.districts)){
          const dr=cityRec.districts.find(rd=>rd.district===dDistrict);
          if(dr&&typeof dr.zone==="number")return dr.zone;
        }
        // 既有 058b：remote_districts fallback
        if(Array.isArray(cityRec.remote_districts)){
          const dr=cityRec.remote_districts.find(rd=>rd.district===dDistrict);
          if(dr&&typeof dr.zone==="number")return dr.zone;
        }
      }
      if(typeof cityRec.zone==="number")return cityRec.zone;
    }
  }
  // fallback 058f 案主條件 URL 帶值
  const z=parseInt(P.zone,10);
  if(!isNaN(z))return z;
  return null;
}
function _quotaRowLabel(row){
  if(row.bucket==="B2"){
    // CARD-058g + CARD-058b：D 區「服務項目」帶 city/district 優先級（dCity 優先 / P.city fallback）
    const city=(dCity||P.city||"").trim();
    const district=(dDistrict||"").trim();
    if(city&&district)return row.label+"─"+city+" "+district;
    if(city){
      const z=_resolveDZone();
      if(z!=null)return row.label+"─"+city+" 第"+z+"類";
      return row.label+"─"+city;
    }
  }
  return row.label;
}
function renderQuotaBars(){
  const box=document.getElementById("quota-bars");
  const body=document.getElementById("quota-bars-body");
  if(!box||!body)return;
  body.innerHTML="";
  _QUOTA_TABLE_ROWS.forEach(row=>{
    const tr=document.createElement("tr");
    tr.setAttribute("data-bucket",row.bucket);
    // 服務項目
    const td0=document.createElement("td");td0.textContent=_quotaRowLabel(row);
    // 自付額（updateQuotaTable 即時填）
    const td1=document.createElement("td");td1.className="qt-coshare";td1.textContent="$0";
    td1.setAttribute("data-col","coshare");
    // 已使用額
    const td2=document.createElement("td");td2.className="qt-used";td2.textContent="$0";
    td2.setAttribute("data-col","used");
    // 餘額
    const td3=document.createElement("td");td3.className="qt-remaining";td3.textContent="$0";
    td3.setAttribute("data-col","remaining");
    tr.appendChild(td0);tr.appendChild(td1);tr.appendChild(td2);tr.appendChild(td3);
    body.appendChild(tr);
  });
  box.style.display="block";
  updateQuotaTable();
}
function _fmtQuotaMoney(v){
  if(v==null||(typeof v==="number"&&isNaN(v)))return "—";
  return "$"+Number(v).toLocaleString();
}
function updateQuotaTable(){
  const body=document.getElementById("quota-bars-body");
  if(!body)return;
  _QUOTA_TABLE_ROWS.forEach(row=>{
    const tr=body.querySelector('tr[data-bucket="'+row.bucket+'"]');
    if(!tr)return;
    const spent=_bucketSpent(row.bucket);
    const quota=_bucketQuota(row.bucket);
    const rate=_bucketCopayRate(row.bucket);
    const tdCo=tr.querySelector('td[data-col="coshare"]');
    const tdUsed=tr.querySelector('td[data-col="used"]');
    const tdRem=tr.querySelector('td[data-col="remaining"]');
    // 自付額：rate=null（B2 缺 city/zone）→ 顯「—」
    if(rate==null){tdCo.textContent="—";tdCo.classList.add("qt-muted");}
    else{tdCo.textContent=_fmtQuotaMoney(Math.round(spent*rate));tdCo.classList.remove("qt-muted");}
    // 已使用額
    tdUsed.textContent=_fmtQuotaMoney(spent);
    // 餘額：quota=null（B2 缺 quota / OT 永無 quota）→ 顯「—」
    tdRem.classList.remove("qt-zero","qt-muted");
    if(quota==null){tdRem.textContent="—";tdRem.classList.add("qt-muted");}
    else{
      const rem=quota-spent;
      tdRem.textContent=_fmtQuotaMoney(Math.max(0,rem));
      if(rem<=0)tdRem.classList.add("qt-zero");
    }
  });
}

/* CARD-042：對每個 item 建單價 chip + （type=both 時）租賃 radio
   CARD-052：移除 service 型早 return；改為「price 缺/0 才不顯示」。
             service 型（BA/BB/BC/BD/C/G）顯示「$260/次」；buy 型保留「購 $1,200」；rent/both 既有邏輯不動。 */
function buildPriceRow(code){
  const m=ITEM_META[code];
  if(!m)return null;
  const row=document.createElement("div");
  row.className="price-row";
  const chip=document.createElement("span");
  chip.className="price-chip "+(m.type||"buy");
  chip.dataset.code=code;
  function chipText(mode){
    if(mode==="rent"&&m.rent_price!=null)return "租 $"+m.rent_price.toLocaleString()+"/月";
    if(m.price!=null)return "購 $"+m.price.toLocaleString();
    return "—";
  }
  if(m.type==="rent"){
    chip.textContent=(m.rent_price!=null)?"租 $"+m.rent_price.toLocaleString()+"/月":"租賃";
  }else if(m.type==="both"){
    chip.textContent=chipText("buy");
    rentChoice.set(code,"buy");
    const sw=document.createElement("span");
    sw.className="rent-switch";
    ["buy","rent"].forEach(mode=>{
      const lbl=document.createElement("label");
      const rd=document.createElement("input");
      rd.type="radio";rd.name="rent-"+code;rd.value=mode;
      if(mode==="buy")rd.checked=true;
      rd.addEventListener("change",()=>{
        if(rd.checked){
          rentChoice.set(code,mode);
          chip.textContent=chipText(mode);
        }
      });
      lbl.appendChild(rd);
      lbl.appendChild(document.createTextNode(mode==="buy"?"購":"租"));
      sw.appendChild(lbl);
    });
    row.appendChild(chip);
    row.appendChild(sw);
    return row;
  }else if(m.type==="service"){
    // CARD-052：service 型（BA/BB/BC/BD/C/G）顯示「$260/次」；price 缺/0 → 不顯示（graceful）
    if(!(m.price&&m.price>0))return null;
    chip.textContent="$"+m.price.toLocaleString()+(m.unit?"/"+m.unit:"");
  }else{
    // type=buy（or fallback）：CARD-052 加 price>0 守門避免顯示「購 $0」
    if(!(m.price&&m.price>0))return null;
    chip.textContent="購 $"+m.price.toLocaleString();
  }
  row.appendChild(chip);
  return row;
}

function render(){
  // CARD-053a-fix：duplicate code detector — 14 區 EXTRA_SECTIONS 與 hardcode CATS 重複會 state 覆蓋 / 雙重 stepper
  const _seen=new Set(),_dupes=[];
  CATS.forEach(c=>c.items.forEach(it=>{if(_seen.has(it.c))_dupes.push(it.c);else _seen.add(it.c);}));
  if(_dupes.length)console.warn("[CARD-053a-fix] duplicate codes detected:",_dupes);
  const root=document.getElementById("sections");
  // CARD-058g：6 包預設摺疊 — <details class="bucket-wrapper"> 包 summary + content；點 summary native toggle
  const bucketContent=new Map();// bucket → .bucket-content DOM
  CATS.forEach(cat=>{
    const bucket=BUCKET_OF[cat.id]||"NOTE";
    // 該包 wrapper 不存在 → 新建 details + summary + content
    if(!bucketContent.has(bucket)){
      const wrapper=document.createElement("details");
      wrapper.className="bucket-wrapper";
      wrapper.setAttribute("data-bucket",bucket);
      // 預設不加 open（全摺疊）
      const summary=document.createElement("summary");
      summary.className="bucket-summary";
      summary.setAttribute("data-bucket",bucket);
      const content=document.createElement("div");
      content.className="bucket-content";
      wrapper.appendChild(summary);
      wrapper.appendChild(content);
      root.appendChild(wrapper);
      bucketContent.set(bucket,content);
    }
    const sec=document.createElement("div");sec.className="sec";sec.setAttribute("data-fam",cat.id);
    sec.setAttribute("data-bucket",bucket);// CARD-058c：S/OT 鎖樣式 hook
    const secHdr=document.createElement("div");secHdr.className="sec-header";
    const h2=document.createElement("h2");h2.textContent=cat.name;
    const secActions=document.createElement("div");secActions.className="sec-actions";
    const btnAll=document.createElement("button");btnAll.type="button";btnAll.textContent="全選";
    const btnNone=document.createElement("button");btnNone.type="button";btnNone.textContent="清除";
    // CARD-058e：S/OT 解鎖（058c NOTE disabled 已移除）— 全選/清除按鈕對所有 bucket 啟用
    secActions.appendChild(btnAll);secActions.appendChild(btnNone);
    const secCount=document.createElement("span");secCount.className="sec-count";secCount.textContent="0 / "+cat.items.length;
    secHdr.appendChild(h2);secHdr.appendChild(secActions);secHdr.appendChild(secCount);
    sec.appendChild(secHdr);
    // CARD-058b：D 區加「縣市/行政區」下拉（只影響 D 包 B2 per_trip 計算，不 cascade）
    if(cat.id==="D"){
      const dz=_buildDZonePicker();
      sec.appendChild(dz);
    }
    const items=document.createElement("div");items.className="items";
    cat.items.forEach(it=>{
      // CARD-053a：label → div（不再用 label[for=cb] 行為，stepper 自有 click 事件）
      const row=document.createElement("div");row.className="itm";row.setAttribute("data-code",it.c);
      const body=document.createElement("div");body.className="i-body";
      const name=document.createElement("div");name.className="i-name";name.textContent=it.n;
      const code=document.createElement("div");code.className="i-code";code.textContent=it.c;
      // CARD-058-modal：點 i-code 跳 modal 顯該 code 官方說明
      code.style.cursor="pointer";
      code.style.textDecoration="underline";
      code.setAttribute("role","button");
      code.setAttribute("tabindex","0");
      code.setAttribute("aria-label","查看 "+it.c+" "+it.n+" 官方說明");
      code.dataset.code=it.c;
      code.dataset.name=it.n;
      body.appendChild(name);body.appendChild(code);
      /* CARD-042：租賃 / 單價 chip（僅在 ITEM_META 有資料時顯示）*/
      const pr=buildPriceRow(it.c);
      if(pr)body.appendChild(pr);
      row.appendChild(body);
      // CARD-053a：epizy 風格 stepper —[$小計] [-] [text] [+]
      const stp=buildStepper(it.c,it.n);
      // CARD-058e：S/OT 解鎖（058c stepper input disabled 已移除）
      row.appendChild(stp);
      items.appendChild(row);
    });
    sec.appendChild(items);
    // CARD-053a：btnAll → state.set(code, 1) for all；btnNone → state.delete + qv=0
    btnAll.addEventListener("click",ev=>{
      // CARD-058g：避免 click 冒泡到 details summary（如 btnAll 在 sec-header 內，sec 在 bucket-content 內，不在 summary 內，原則安全；保險起見 stop）
      ev.stopPropagation();
      // CARD-058e：S/OT 解鎖（058c NOTE return guard 已移除）
      cat.items.forEach(it=>{
        const cur=state.get(it.c)||0;
        if(cur===0){applyQty(it.c,1);}
      });
    });
    btnNone.addEventListener("click",ev=>{
      ev.stopPropagation();
      cat.items.forEach(it=>{
        if(state.has(it.c)){applyQty(it.c,0);}
      });
    });
    // CARD-058g：細項區 sec append 到該包的 .bucket-content（grid 3 欄並排），非 sections root
    bucketContent.get(bucket).appendChild(sec);
  });
}

// CARD-058b：建 D 區「縣市/行政區」下拉 — 只影響 D 包 B2 per_trip 計算（不 cascade 到 B1/B3/B4）
function _buildDZonePicker(){
  const wrap=document.createElement("div");
  wrap.className="d-zone-picker";
  wrap.id="d-zone-picker";
  // 縣市 select
  const lblCity=document.createElement("label");lblCity.htmlFor="d-city";lblCity.textContent="所在縣市";
  const selCity=document.createElement("select");selCity.id="d-city";selCity.setAttribute("aria-label","D 區所在縣市");
  const optEmptyC=document.createElement("option");optEmptyC.value="";optEmptyC.textContent="-- 請選縣市 --";selCity.appendChild(optEmptyC);
  (CITY_ZONES.cities||[]).forEach(c=>{
    const opt=document.createElement("option");opt.value=c.city;opt.textContent=c.city;
    selCity.appendChild(opt);
  });
  // 行政區 select（依 city cascade）
  const lblDist=document.createElement("label");lblDist.htmlFor="d-district";lblDist.textContent="行政區";
  const selDist=document.createElement("select");selDist.id="d-district";selDist.setAttribute("aria-label","D 區行政區");
  const optEmptyD=document.createElement("option");optEmptyD.value="";optEmptyD.textContent="（依縣市預設分區）";selDist.appendChild(optEmptyD);
  // 提示文字
  const hint=document.createElement("span");hint.className="dz-hint";hint.id="d-zone-hint";hint.textContent="";
  // change handlers
  selCity.addEventListener("change",ev=>{
    ev.stopPropagation();
    dCity=selCity.value||"";
    // 縣市改變 → 重設行政區（避免殘留錯 zone）
    dDistrict="";
    selDist.innerHTML="";
    selDist.appendChild(optEmptyD);
    if(dCity){
      const cityRec=(CITY_ZONES.cities||[]).find(c=>c.city===dCity);
      const hasAll=!!(cityRec&&Array.isArray(cityRec.districts)&&cityRec.districts.length);
      const hasRemote=!!(cityRec&&Array.isArray(cityRec.remote_districts)&&cityRec.remote_districts.length);
      if(hasAll){
        // CARD-058b-fix2：22 縣市全 districts 補齊 → 顯該縣市全 368 區（不只偏遠）；偏遠 zone 異於縣市預設時加標籤
        optEmptyD.textContent="（依縣市預設分區）";
        selDist.disabled=false;
        selDist.title="";
        selDist.removeAttribute("aria-describedby");
        const cityZone=cityRec.zone;
        cityRec.districts.forEach(rd=>{
          const opt=document.createElement("option");opt.value=rd.district;
          opt.textContent=(typeof rd.zone==="number"&&rd.zone!==cityZone)?(rd.district+"（第"+rd.zone+"類）"):rd.district;
          selDist.appendChild(opt);
        });
      }else if(hasRemote){
        // CARD-058b-fix（fallback）：只有 remote_districts 沒 districts → 顯偏遠區
        optEmptyD.textContent="（依縣市預設分區）";
        selDist.disabled=false;
        selDist.title="";
        selDist.removeAttribute("aria-describedby");
        cityRec.remote_districts.forEach(rd=>{
          const opt=document.createElement("option");opt.value=rd.district;opt.textContent=rd.district+"（第"+rd.zone+"類）";
          selDist.appendChild(opt);
        });
      }else{
        // CARD-058b-fix：沒 remote_districts 縣市（如彰化縣）→ disabled + 提示「整縣市同分區」+ a11y
        const zoneText=cityRec?("第 "+cityRec.zone+" 類"):"";
        optEmptyD.textContent="（"+dCity+"全縣市同 "+zoneText+"，無需選行政區）";
        selDist.disabled=true;
        selDist.title=dCity+"全縣市為 "+zoneText+"，行政區下拉停用（衛福部 city_zones 資料只記偏遠區）";
        selDist.setAttribute("aria-describedby","d-zone-hint");
      }
    }else{
      // dCity 清空 → 還原 enable + 預設提示
      optEmptyD.textContent="（依縣市預設分區）";
      selDist.disabled=false;
      selDist.title="";
      selDist.removeAttribute("aria-describedby");
    }

// CARD-053a：build epizy 風格 stepper（class 與 epizy DOM 對齊；oninput/onclick attr 對齊）
// CARD-058b：DA01 user_input 例外 — 中央改 type=number 直接輸金額；+/- 步長 100
function buildStepper(code,nm){
  const wrap=document.createElement("div");
  wrap.className="div_price_count";
  wrap.id="prct_"+code;
  wrap.setAttribute("data-code",code);
  wrap.setAttribute("role","group");
  wrap.setAttribute("aria-label",nm+" 數量選擇");
  const m=ITEM_META[code];
  const isUserInput=!!(m&&m.pricing_type==="user_input");
  if(isUserInput)wrap.classList.add("user-input");
  // 該項小計
  const priceBox=document.createElement("div");priceBox.className="div_CI_price";
  const priceSpan=document.createElement("span");priceSpan.className="span_CI_price";priceSpan.textContent="$0";
  priceBox.appendChild(priceSpan);
  // 三節點容器
  const counter=document.createElement("div");counter.className="div_counter";
  const minus=document.createElement("input");
  minus.className="btn_minus btn";minus.type="button";minus.value="-";
  minus.setAttribute("onclick","DecreaseCount(this)");
  minus.setAttribute("aria-label",isUserInput?("減少 "+nm+" 金額（步長 100）"):("減少 "+nm+" 數量"));
  const txt=document.createElement("input");
  txt.className="txt_CI_qty";
  if(isUserInput){
    // CARD-058b：DA01 user_input — 金額輸入框（type=number，0-99999）
    txt.type="number";
    txt.setAttribute("min","0");txt.setAttribute("max","99999");txt.setAttribute("step","1");
    txt.setAttribute("placeholder","車資");
    txt.setAttribute("aria-label",nm+" 金額（請輸入車資）");
    txt.style.width="80px";
  }else{
    txt.type="text";
    txt.setAttribute("inputmode","numeric");
    txt.setAttribute("maxlength","2");
    txt.setAttribute("aria-label",nm+" 目前數量");
  }
  txt.value="";
  txt.setAttribute("oninput","onTextInput(this)");
  const plus=document.createElement("input");
  plus.className="btn_plus btn";plus.type="button";plus.value="+";
  plus.setAttribute("onclick","IncreaseCount(this)");
  plus.setAttribute("aria-label",isUserInput?("增加 "+nm+" 金額（步長 100）"):("增加 "+nm+" 數量"));
  counter.appendChild(minus);counter.appendChild(txt);counter.appendChild(plus);
  wrap.appendChild(priceBox);wrap.appendChild(counter);
  if(isUserInput){
    const note=document.createElement("span");
    note.className="user-input-note";
    note.textContent="※ 請直接輸入車資金額（單趟元）";
    note.style.fontSize=".7em";note.style.color="var(--muted)";note.style.marginLeft="6px";
    wrap.appendChild(note);
  }
  // price=None / 0 時，加小字提示（CARD-058b：m 已在前面宣告，不重複 const）
  const t=(m&&m.type)||"buy";
  const hasPrice=
    (t==="rent")?(m&&m.rent_price&&m.rent_price>0):
    (t==="both")?((m&&m.price&&m.price>0)||(m&&m.rent_price&&m.rent_price>0)):
    (m&&m.price&&m.price>0);
  if(!hasPrice){
    wrap.classList.add("no-price");
    const note=document.createElement("span");
    note.className="no-price-note";
    note.textContent="✱ 無單價";
    wrap.appendChild(note);
  }
  return wrap;
}

function updateSectionCounts(){

    if(!sec)return;
    const count=cat.items.filter(it=>state.has(it.c)).length;
    const el=sec.querySelector(".sec-count");
    el.textContent=count+" / "+cat.items.length;
    el.classList.toggle("has",count>0);

function buildQueryUrl(){
  const base=getQueryBaseUrl();
  if(!base)return "";
  // CARD-053a：state 改 Map 後內部改 keys filter；對外輸出 codes=A,B,C 形狀不變
  const codes=Array.from(state.keys()).filter(c=>state.get(c)>0).join(",");
  const qs=new URLSearchParams();
  qs.set("codes",codes);
  // CARD-055a-1：qty pass-through 給 Web B（form `code:N,code:N`，N 為 state Map 數量；user_input DA01 也帶 N=1 啟用旗標）
  const qty=Array.from(state.entries()).filter(([_,n])=>n>0).map(([c,n])=>c+":"+n).join(",");
  if(qty)qs.set("qty",qty);
  if(P.user_id)qs.set("user_id",P.user_id);
  if(P.session)qs.set("session",P.session);
  if(P.channel)qs.set("channel",P.channel);
  if(P.guild)qs.set("guild",P.guild);
  // CARD-035：把 webhook / issued_at 帶給 Web B
  if(P.webhook)qs.set("webhook",P.webhook);
  if(P.issued_at)qs.set("issued_at",P.issued_at);
  const sep=base.indexOf("?")>=0?"&":"?";
  return base+sep+qs.toString();
}

// CARD-053a：epizy 全域 stepper handlers（onclick / oninput attr 對齊 epizy DOM）
function _stepperCode(elem){
  const wrap=elem&&elem.closest?elem.closest(".div_price_count"):null;
  return wrap?wrap.getAttribute("data-code"):null;
}
// CARD-058b：判斷 code 是否走 user_input pricing
function _isUserInput(code){
  const m=ITEM_META[code];
  return !!(m&&m.pricing_type==="user_input");
}
window.IncreaseCount=function(btn){
  const code=_stepperCode(btn);if(!code)return;
  if(_isUserInput(code)){
    // CARD-058b：DA01 +/- 步長 100，金額寫 inputAmountMap，state.set("DA01", amt>0 ? 1 : 0)
    const cur=inputAmountMap.get(code)||0;
    applyAmount(code,Math.max(0,Math.min(99999,cur+100)));
    return;
  }
  const cur=state.get(code)||0;
  applyQty(code,Math.max(0,Math.min(99,cur+1)));
};
window.DecreaseCount=function(btn){
  const code=_stepperCode(btn);if(!code)return;
  if(_isUserInput(code)){
    const cur=inputAmountMap.get(code)||0;
    applyAmount(code,Math.max(0,Math.min(99999,cur-100)));
    return;
  }
  const cur=state.get(code)||0;
  applyQty(code,Math.max(0,Math.min(99,cur-1)));
};
window.onTextInput=function(input){
  const code=_stepperCode(input);if(!code)return;
  if(_isUserInput(code)){
    // CARD-058b：DA01 type=number — 直接寫 inputAmountMap，state.set 為啟用旗標
    let raw=(input.value||"").replace(/[^\d]/g,"");
    let amt=raw===""?0:parseInt(raw,10);
    if(isNaN(amt))amt=0;
    amt=Math.max(0,Math.min(99999,amt));
    input.value=amt===0?"":String(amt);
    applyAmount(code,amt,/*fromText=*/true);
    return;
  }
  let raw=(input.value||"").replace(/[^\d]/g,"");
  if(raw.length>2)raw=raw.slice(0,2);
  let nv=raw===""?0:parseInt(raw,10);
  if(isNaN(nv))nv=0;
  nv=Math.max(0,Math.min(99,nv));
  // 立刻把 input.value clamp 顯示（避免使用者打 999 還留著）
  input.value=nv===0?"":String(nv);
  applyQty(code,nv,/*fromText=*/true);
};
// CARD-058b：user_input 商品的 state 寫入入口（與 applyQty 平行）
function applyAmount(code,amt,fromText){
  amt=Math.max(0,Math.min(99999,amt|0));
  if(amt===0){inputAmountMap.delete(code);state.delete(code);}
  else{inputAmountMap.set(code,amt);state.set(code,1);}
  const wrap=document.getElementById("prct_"+CSSEsc(code));
  if(wrap){
    const txt=wrap.querySelector(".txt_CI_qty");
    if(txt&&!fromText){txt.value=amt===0?"":String(amt);}
  }
  refreshItemRow(code);
  updateCounter();updateSectionCounts();
  const owningCat=CATS.find(c=>c.items.some(it=>it.c===code));
  if(owningCat){
    const bucket=BUCKET_OF[owningCat.id]||"NOTE";
    updateBucketSummary(bucket);
  }
  updateQuotaTable();
}

// CARD-053a + CARD-058b：依 type 與 rentChoice 決定本次估算用 price 還是 rent_price；
// pricing_type=user_input → adapter 走 inputAmountMap（DA01 個案直接輸入車資）
function effectivePrice(code){
  const m=ITEM_META[code];if(!m)return null;
  // CARD-058b：user_input adapter — 不走 N×price，N 只是啟用旗標（>0 計入），金額用 inputAmountMap
  if(m.pricing_type==="user_input"){
    const amt=inputAmountMap.get(code);
    return (typeof amt==="number"&&amt>0)?amt:null;
  }
  const t=m.type||"buy";
  if(t==="rent"){return (m.rent_price&&m.rent_price>0)?m.rent_price:null;}
  if(t==="both"){
    const mode=rentChoice.get(code)||"buy";
    if(mode==="rent")return (m.rent_price&&m.rent_price>0)?m.rent_price:null;
    return (m.price&&m.price>0)?m.price:null;
  }
  // buy / service / unknown
  return (m.price&&m.price>0)?m.price:null;
}
function estimateBucket(code){
  const m=ITEM_META[code]||{};
  const t=m.type||"buy";
  if(t==="rent")return "rent";
  if(t==="both")return (rentChoice.get(code)||"buy")==="rent"?"rent":"buy";
  return "buy";// buy / service 都歸購置桶
}

// CARD-053a：刷新單列 stepper 對應的小計 span（不動 input.value，由呼叫端控制）
function refreshItemRow(code){

// CARD-058：URL identity canonical flags 解析
function _identityHas(flag){
  const raw=String(P.identity||"").toLowerCase();
  if(!raw)return false;
  return raw.split(",").map(s=>s.trim()).indexOf(flag)>=0;
}
function _income(){
  const v=String(P.income||"").trim();
  if(v==="")return "general";// 預設一般戶
  if(v==="normal")return "general";// 容忍別名
  return v;
}
// CARD-058c + CARD-058b：本包 spent；fixed price 走 N × effectivePrice，user_input 走 inputAmountMap 直加（不乘 N，避免 N>1 重複計）
function _bucketSpent(bucket){
  let spent=0;
  CATS.forEach(cat=>{
    if((BUCKET_OF[cat.id]||"NOTE")!==bucket)return;
    cat.items.forEach(it=>{
      const qty=state.get(it.c)||0;
      if(!(qty>0))return;
      const m=ITEM_META[it.c];
      if(m&&m.pricing_type==="user_input"){
        // CARD-058b：user_input — N 只表啟用，金額用 inputAmountMap 直接累加
        const amt=inputAmountMap.get(it.c);
        if(typeof amt==="number"&&amt>0)spent+=amt;
        return;
      }
      const eff=effectivePrice(it.c);
      if(eff==null)return;
      spent+=eff*qty;
    });
  });
  return spent;
}
// CARD-058：本區 quota（補助上限）— B1/B4 依 cms 表、B3 total_limit、B2 依 zone monthly_limit；URL 帶 b*_quota 優先
function _bucketQuota(bucket){
  const cms=parseInt(P.cms,10);
  const incomeKey=_income();
  if(bucket==="B1"){
    if(P._has&&P._has("b1_quota"))return parseInt(P.b1_quota||"0",10);
    if(!isNaN(cms)&&SUBSIDY.B1.limits_by_cms[cms]!=null){
      let lim=SUBSIDY.B1.limits_by_cms[cms];
      if(_identityHas("foreign_caregiver"))lim=Math.round(lim*SUBSIDY.B1.foreign_cg_ratio);
      return lim;
    }
    return null;
  }
  if(bucket==="B2"){
    if(P._has&&P._has("b2_quota"))return parseInt(P.b2_quota||"0",10);
    // CARD-058b：dCity/dDistrict（D 區獨立）優先；推 zone → SUBSIDY.B2.zones[zone].monthly_limit
    const z=_resolveDZone();
    if(z!=null){
      const zoneSummary=(CITY_ZONES.zone_summary||{})[String(z)];
      if(zoneSummary&&typeof zoneSummary.b2_amount==="number")return zoneSummary.b2_amount;
    }
    return null;
  }
  if(bucket==="B3"){
    if(P._has&&P._has("b3_quota"))return parseInt(P.b3_quota||"0",10);
    return SUBSIDY.B3.total_limit;
  }
  if(bucket==="B4"){
    if(P._has&&P._has("b4_quota"))return parseInt(P.b4_quota||"0",10);
    if(!isNaN(cms)&&SUBSIDY.B4.limits_by_cms[cms]!=null)return SUBSIDY.B4.limits_by_cms[cms];
    return null;
  }
  // CARD-058e：S 包 — URL s_quota 優先，沒帶用 SUBSIDY.S.default_quota fallback（epizy 推算）
  if(bucket==="S"){
    if(P._has&&P._has("s_quota"))return parseInt(P.s_quota||"0",10);
    return SUBSIDY.S.default_quota;
  }
  // CARD-058e：OT 包不放進度條 → quota 永遠 null（updateBucketSummary 跳過 progress）
  if(bucket==="OT")return null;
  return null;
}
// CARD-058：本區 copay 比 — B1/B4 用 copay_rates、B3 用 B3.copay、B2 zone 缺值（city/zone 任一缺 → null）
function _bucketCopayRate(bucket){
  const incomeKey=_income();
  if(bucket==="B1"||bucket==="B4")return SUBSIDY.copay_rates[incomeKey];
  if(bucket==="B3")return SUBSIDY.B3.copay[incomeKey];
  if(bucket==="B2"){
    // CARD-058b：dCity/dDistrict 獨立優先；fallback P.city/P.zone（058f 案主條件）；皆缺 → null
    const z=_resolveDZone();
    if(z==null)return null;
    const zoneRule=SUBSIDY.B2.zones[String(z)];
    if(!zoneRule||!zoneRule.copay)return null;
    return zoneRule.copay[incomeKey];
  }
  // CARD-058e：S / OT 暫用 epizy 估算 copay（CARD-059 待校正衛福部）
  if(bucket==="S")return SUBSIDY.S.copay[incomeKey];
  if(bucket==="OT")return SUBSIDY.OT.copay[incomeKey];
  return null;
}

    fill.style.width="0%";
    fill.classList.remove("over");
    pctEl.textContent="—";
    pctEl.setAttribute("title","未帶 quota（URL 沒帶 b"+bucket.charAt(1)+"_quota）");
    return;
  }
  // quota 有值：共用 sticky quota-bars 同邏輯（renderQuotaBars 用 Math.round((used/quota)*100)）
  const pctRaw=quota>0?(spent/quota)*100:0;
  const pct=Math.max(0,Math.min(100,Math.round(pctRaw)));
  const over=spent>quota;
  fill.style.width=(over?100:pct)+"%";
  fill.classList.toggle("over",over);
  pctEl.textContent=pct+"%";
  pctEl.removeAttribute("title");
}
function updateBucketSummary(bucket){
  const box=document.querySelector('.bucket-summary[data-bucket="'+bucket+'"]');
  if(!box)return;
  const titleHTML='<div class="bs-title">'+(BUCKET_LABEL[bucket]||bucket)+'</div>';
  // CARD-058e：S/OT 警示橫幅（縣市政策 / epizy 估算 / 待 CARD-059 校正）
  const warnHTML='<span class="bs-warn">⚠️ 縣市政策補助，本系統使用 epizy 計算邏輯估算，<b>不可作為正式核銷依據</b>，CARD-059 將對衛福部規則校正</span>';
  // CARD-058d：B1-B4 都有 progress bar
  const progressHTML=_bucketProgressHTML(bucket);
  // CARD-058b：B2 placeholder 早 return 已移除 — DA01 改 user_input 後 B2 走標準 spent/quota/copay path
  box.classList.remove("note-only","placeholder");
  // 計算 spent / quota / copay rate（B1/B3/B4/S/OT 共用）
  const spent=_bucketSpent(bucket);
  const quota=_bucketQuota(bucket);
  const rate=_bucketCopayRate(bucket);
  let coshareTxt;
  if(rate==null){
    coshareTxt='<span class="ss-val muted" title="需選縣市/區域後估算">需選縣市/區域</span>';
  }else{
    const co=Math.round(spent*rate);
    coshareTxt='<span class="ss-val">'+_fmtMoney(co)+'</span>';
  }
  let remTxt;
  if(quota==null){
    remTxt='<span class="ss-val muted" title="—=未帶入額度">—</span>';
  }else{
    const rem=quota-spent;
    if(rem<=0)remTxt='<span class="ss-val zero" title="$0=已無餘額">'+_fmtMoney(Math.max(0,rem))+'</span>';
    else remTxt='<span class="ss-val">'+_fmtMoney(rem)+'</span>';
  }
  // CARD-058e：S 包完整顯（已用/餘額/自付額/進度條）+ 警示橫幅 + [暫估] 前綴
  if(bucket==="S"){
    box.classList.add("warn-estimate");
    box.innerHTML=titleHTML+
      '<span class="ss-cell used"><span class="ss-label">已使用額:</span><span class="ss-val">'+_fmtMoney(spent)+'</span></span>'+
      '<span class="ss-cell remaining"><span class="ss-label">餘額:</span>'+remTxt+'</span>'+
      '<span class="ss-cell coshare"><span class="ss-label">自付額:</span>'+coshareTxt+'</span>'+
      progressHTML+warnHTML;
    _setBucketProgress(box,bucket,spent,quota);
    return;
  }
  // CARD-058e：OT 包只顯（已用/自付額）— 不顯餘額、不放進度條 + 警示橫幅 + [暫估] 前綴
  if(bucket==="OT"){
    box.classList.add("warn-estimate");
    box.innerHTML=titleHTML+
      '<span class="ss-cell used"><span class="ss-label">已使用額:</span><span class="ss-val">'+_fmtMoney(spent)+'</span></span>'+
      '<span class="ss-cell coshare"><span class="ss-label">自付額:</span>'+coshareTxt+'</span>'+
      warnHTML;
    return;
  }
  box.classList.remove("warn-estimate");
  // B1 / B3 / B4：合併計算包內所有 codes 的 spent / 自付 / 餘額
  box.innerHTML=titleHTML+
    '<span class="ss-cell used"><span class="ss-label">已使用額:</span><span class="ss-val">'+_fmtMoney(spent)+'</span></span>'+
    '<span class="ss-cell remaining"><span class="ss-label">餘額:</span>'+remTxt+'</span>'+
    '<span class="ss-cell coshare"><span class="ss-label">自付額:</span>'+coshareTxt+'</span>'+
    progressHTML;
  _setBucketProgress(box,bucket,spent,quota);
}

// CARD-058f：案主條件 3 下拉初始化 + change handler（rAF + dirty flag 合併連續 change）
function initCaseConditions(){
  const cms=document.getElementById("cc-cms");
  const income=document.getElementById("cc-income");
  const identity=document.getElementById("cc-identity");
  if(!cms||!income||!identity)return;
  // URL 預設值套用（CARD-046 注入 cms/income/identity）
  if(P.cms){const v=String(P.cms);if(cms.querySelector('option[value="'+v+'"]'))cms.value=v;}
  if(P.income){
    let v=String(P.income).trim();
    if(v==="normal")v="general";// 容忍別名
    if(income.querySelector('option[value="'+v+'"]'))income.value=v;
  }
  if(P.identity){
    // canonical flags comma list（單選對齊 epizy）；多值取第一個 + console.warn + 視覺警示
    const all=String(P.identity).split(",").map(s=>s.trim()).filter(Boolean);
    const first=all[0]||"";
    if(identity.querySelector('option[value="'+first+'"]'))identity.value=first;
    if(all.length>1){
      console.warn("[CARD-058f] URL identity 含多值，本介面僅顯第一個："+first+"（其餘忽略：["+all.slice(1).join(",")+"]）");
      const box=document.getElementById("case-conditions");
      if(box)box.classList.add("has-multi-identity");
    }
  }
  // 初次同步 P 物件（避免 select 預設與 P 不一致）
  P.cms=cms.value;
  P.income=income.value;
  P.identity=identity.value;
  // 綁 change handlers
  cms.addEventListener("change",()=>onCaseConditionChange("cms",cms.value));
  income.addEventListener("change",()=>onCaseConditionChange("income",income.value));
  identity.addEventListener("change",()=>onCaseConditionChange("identity",identity.value));
}
let _ccDirty=false;
function _ccFlush(){
  _ccDirty=false;
  // 重算 6 包 summary + sticky 表格

function onCaseConditionChange(field,value){
  P[field]=value;
  // CARD-058f-fix：人類拍板「Web 為準」— 使用者改下拉 → invalidate URL b*_quota（讓 cms/identity 真的 ripple）；
  // 不保留 Discord 原算值，_bucketQuota 退回 cms × SUBSIDY 算
  if(field==="cms"){delete P.b1_quota;delete P.b4_quota;}
  if(field==="identity"){delete P.b1_quota;}
  // income 只影響 copay rate，不需 invalidate quota
  // 同步 status-banner（既有 CARD-042 顯示）
  renderStatusBanner();
  // CARD-058f：URL replaceState（不 pushState 避免歷史污染）+ CARD-058f-fix：同步 delete URL b*_quota param 避免 reload 後拿回 stale 值
  try{
    const u=new URL(location.href);
    if(field==="cms"){u.searchParams.delete("b1_quota");u.searchParams.delete("b4_quota");}
    if(field==="identity"){u.searchParams.delete("b1_quota");}
    if(value===""||value==null)u.searchParams.delete(field);
    else u.searchParams.set(field,String(value));
    history.replaceState(null,"",u.toString());
  }catch(e){/* swallow */}
  // CARD-058f：rAF + dirty flag 合併連續 change（避免 6 包重複 render lag）
  if(!_ccDirty){
    _ccDirty=true;
    requestAnimationFrame(_ccFlush);
  }
}

// CARD-058-modal：點 code 跳 modal 顯官方說明 + focus trap modal-scoped
function _modalEscapeHTML(s){
  return String(s||"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch]);
}
let _modalOpener=null;// 記住開啟前的 activeElement，close 後 restore focus
function openCodeModal(code,name){
  const m=ITEM_META[code]||{};
  const modal=document.getElementById("code-modal");
  if(!modal)return;
  document.getElementById("code-modal-title").textContent=code+"［"+name+"］";
  const body=document.getElementById("code-modal-body");
  let html="";
  if(m.description){html+='<section><h3>內容說明</h3><p>'+_modalEscapeHTML(m.description)+'</p></section>';}
  if(m.unit_detail){html+='<section><h3>計算單位</h3><p>'+_modalEscapeHTML(m.unit_detail)+(m.unit?'（單位：'+_modalEscapeHTML(m.unit)+'）':'')+'</p></section>';}
  if(m.note){html+='<section><h3>備註</h3><p>'+_modalEscapeHTML(m.note)+'</p></section>';}
  if(Array.isArray(m.restrictions)&&m.restrictions.length){
    html+='<section><h3>限制條件</h3><ul>'+m.restrictions.map(r=>'<li>'+_modalEscapeHTML(r)+'</li>').join("")+'</ul></section>';
  }
  // 價格資訊
  if(m.price!=null||m.rent_price!=null){
    let p="";
    if(m.price!=null)p+="購置 / 服務費：$"+m.price.toLocaleString()+(m.unit?" / "+m.unit:"");
    if(m.rent_price!=null)p+=(p?"\n":"")+"租賃費：$"+m.rent_price.toLocaleString()+"/月";
    if(p)html='<section><h3>單價資訊</h3><p>'+_modalEscapeHTML(p)+'</p></section>'+html;
  }
  if(!html)html='<div class="muted">本 code 暫無官方說明（CARD-059 待補）</div>';
  body.innerHTML=html;
  const src=document.getElementById("code-modal-source");
  src.textContent=m.description_source?("📋 來源："+m.description_source):(m.price_source?("💰 價格來源："+m.price_source):"");
  // 記 opener + 顯 modal
  _modalOpener=document.activeElement;
  modal.hidden=false;
  document.body.style.overflow="hidden";
  // focus 第一個可聚焦元素（close button）
  const closeBtn=modal.querySelector(".modal-close");
  if(closeBtn)closeBtn.focus();
}
function closeCodeModal(){
  const modal=document.getElementById("code-modal");
  if(!modal||modal.hidden)return;
  modal.hidden=true;
  document.body.style.overflow="";
  // restore opener focus
  if(_modalOpener&&typeof _modalOpener.focus==="function"){
    try{_modalOpener.focus();}catch(e){}
  }
  _modalOpener=null;
}
// CARD-058-modal：event delegation — 點 .i-code 開 modal（限定 closest + stopPropagation 隔離 stepper）
document.addEventListener("click",function(ev){
  const t=ev.target;
  if(!t)return;
  // 關 modal（背景 / 關閉鈕）
  if(t.matches&&t.matches("[data-modal-close]")){
    ev.stopPropagation();
    closeCodeModal();
    return;
  }
  // 點 .i-code → 開 modal
  const codeEl=t.closest&&t.closest(".i-code");
  if(codeEl&&codeEl.dataset&&codeEl.dataset.code){
    ev.stopPropagation();
    openCodeModal(codeEl.dataset.code,codeEl.dataset.name||"");
  }
});
// keyboard: Enter/Space 在 .i-code 上也開 modal（a11y）
document.addEventListener("keydown",function(ev){
  const t=ev.target;
  if(!t)return;
  if((ev.key==="Enter"||ev.key===" ")&&t.classList&&t.classList.contains("i-code")&&t.dataset&&t.dataset.code){
    ev.preventDefault();
    openCodeModal(t.dataset.code,t.dataset.name||"");
  }
});
// CARD-058-modal：focus trap modal-scoped（全域 keydown 第一行 if(modal.hidden)return；只攔 Escape/Tab）
document.addEventListener("keydown",function(ev){
  const modal=document.getElementById("code-modal");
  if(!modal||modal.hidden)return;
  if(ev.key==="Escape"){ev.preventDefault();closeCodeModal();return;}
  if(ev.key==="Tab"){
    // Tab 首尾循環（focus trap）
    const focusables=modal.querySelectorAll('button, [href], [tabindex]:not([tabindex="-1"])');
    if(!focusables.length)return;
    const first=focusables[0],last=focusables[focusables.length-1];
    if(ev.shiftKey&&document.activeElement===first){ev.preventDefault();last.focus();}
    else if(!ev.shiftKey&&document.activeElement===last){ev.preventDefault();first.focus();}
  }
});
