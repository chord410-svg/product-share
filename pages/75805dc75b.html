<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選擇補助代碼 — 長照智慧諮詢</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--danger:#ef4444;--success:#16a34a;--radius:12px;
  /* CARD-042：count 美術 token — type chip + 進度條 4 色 */
  --chip-buy-bg:#dcfce7;--chip-buy-fg:#166534;
  --chip-rent-bg:#fef3c7;--chip-rent-fg:#854d0e;
  --chip-both-bg:#dbeafe;--chip-both-fg:#1e40af;
  --b1-color:#3b82f6;--b2-color:#10b981;--b3-color:#f59e0b;--b4-color:#8b5cf6;
  --warn:#f59e0b;--warn-light:#fef3c7
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px 16px 120px}
header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:20px 24px;border-radius:var(--radius);margin-bottom:16px;text-align:center}
header h1{font-size:1.3em;margin-bottom:4px;letter-spacing:1px}
header .subtitle{font-size:.85em;opacity:.85}
.toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar .counter{font-size:.9em;color:var(--muted)}
.toolbar .counter strong{color:var(--primary);font-size:1.05em}
.toolbar button{padding:7px 14px;font-size:.82em;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit}
.toolbar button:hover{background:var(--primary-light);border-color:var(--primary)}
.sections-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:24px}
@media (max-width:1024px){.sections-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:768px){.sections-grid{grid-template-columns:1fr}.container{padding-bottom:100px}}
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column}
.sec-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px;gap:8px}
.sec-header h2{font-size:.95em;color:var(--primary-dark);font-weight:700;flex:1;min-width:0}
.sec-header .sec-actions{display:flex;gap:4px}
.sec-header .sec-actions button{font-size:.72em;padding:3px 8px;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:4px;cursor:pointer;font-family:inherit}
.sec-header .sec-actions button:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.sec-header .sec-count{font-size:.75em;color:var(--muted);white-space:nowrap}
.sec-header .sec-count.has{color:var(--success);font-weight:700}
.items{display:flex;flex-direction:column;gap:2px;max-height:260px;overflow-y:auto}
.itm{display:flex;align-items:flex-start;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(0,0,0,.04);cursor:pointer;transition:background .12s}
.itm:last-child{border-bottom:none}
.itm:hover{background:var(--primary-light)}
.itm input[type="checkbox"]{margin-top:3px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.itm .i-body{flex:1;min-width:0}
.itm .i-code{font-size:.72em;color:var(--muted);font-family:"SF Mono",Menlo,Monaco,monospace;letter-spacing:.5px}
.itm .i-name{font-size:.85em;line-height:1.4}
.itm.checked{background:var(--primary-light)}
.itm.checked .i-name{font-weight:600;color:var(--primary-dark)}
.footer-bar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;justify-content:center;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:20}
.footer-bar-inner{max-width:1200px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.footer-bar .sum{font-size:.9em;color:var(--muted)}
.footer-bar .sum strong{color:var(--primary);font-size:1.05em}
.next-btn{padding:12px 28px;border-radius:10px;border:none;font-size:.98em;font-weight:700;cursor:pointer;background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.2);transition:all .15s;font-family:inherit}
.next-btn:hover:not(:disabled){background:#15803d;transform:translateY(-1px)}
.next-btn:disabled{background:#cbd5e1;cursor:not-allowed;box-shadow:none}
footer.page-footer{text-align:center;padding:20px 0 100px;font-size:.78em;color:var(--muted)}
/* === CARD-042：status banner + 進度條 + 租賃 UI === */
.status-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:.82em}
.status-banner .sb-tag{background:var(--primary-light);color:var(--primary);padding:3px 10px;border-radius:20px;font-weight:600;font-size:.92em;white-space:nowrap}
.status-banner .sb-tag.warn{background:var(--warn-light);color:#854d0e}
.status-banner .sb-label{color:var(--muted);margin-right:4px}
.quota-bars{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;position:sticky;top:6px;z-index:9;box-shadow:0 2px 6px rgba(0,0,0,.03)}
.quota-bars .qb-title{font-size:.78em;color:var(--muted);margin-bottom:8px;font-weight:600}
.quota-bars .qb-row{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;margin-bottom:6px;font-size:.75em}
.quota-bars .qb-row:last-child{margin-bottom:0}
.quota-bars .qb-label{font-weight:700}
.quota-bars .qb-label.b1{color:var(--b1-color)}
.quota-bars .qb-label.b2{color:var(--b2-color)}
.quota-bars .qb-label.b3{color:var(--b3-color)}
.quota-bars .qb-label.b4{color:var(--b4-color)}
.quota-bars .qb-bar{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;position:relative}
.quota-bars .qb-fill{height:100%;border-radius:4px;transition:width .3s}
.quota-bars .qb-fill.b1{background:var(--b1-color)}
.quota-bars .qb-fill.b2{background:var(--b2-color)}
.quota-bars .qb-fill.b3{background:var(--b3-color)}
.quota-bars .qb-fill.b4{background:var(--b4-color)}
.quota-bars .qb-fill.over{background:var(--danger)!important}
.quota-bars .qb-nums{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.itm .price-row{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:.72em;flex-wrap:wrap}
.itm .price-chip{padding:1px 6px;border-radius:4px;font-weight:600;letter-spacing:.3px}
.itm .price-chip.buy{background:var(--chip-buy-bg);color:var(--chip-buy-fg)}
.itm .price-chip.rent{background:var(--chip-rent-bg);color:var(--chip-rent-fg)}
.itm .price-chip.both{background:var(--chip-both-bg);color:var(--chip-both-fg)}
/* CARD-052：service 型（BA/BB/BC/BD/C/G）chip 樣式——中性灰，與 buy/rent/both 區分但不搶眼 */
.itm .price-chip.service{background:#f1f5f9;color:#475569}
.itm .rent-switch{display:inline-flex;gap:6px;margin-left:4px}
.itm .rent-switch label{display:inline-flex;align-items:center;gap:2px;cursor:pointer;font-size:.95em;color:var(--muted)}
.itm .rent-switch input[type="radio"]{accent-color:var(--primary);cursor:pointer}
.single-approval-note{text-align:center;margin:12px 0 4px;padding:10px 14px;background:var(--warn-light);color:#854d0e;border:1px dashed #f59e0b;border-radius:8px;font-size:.78em;line-height:1.6}
.single-approval-note strong{color:#b45309}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔍 選擇補助代碼</h1>
    <div class="subtitle">請勾選要查詢的補助項目，可跨族多選</div>
  </header>

  <!-- CARD-042：status banner（CMS/收入/縣市/zone/外看）-->
  <div id="status-banner" class="status-banner" style="display:none"></div>

  <!-- CARD-042：sticky 四色進度條（B1-B4 + 總覽）-->
  <div id="quota-bars" class="quota-bars" style="display:none">
    <div class="qb-title">💰 額度使用概況</div>
    <div id="quota-bars-body"></div>
  </div>

  <div class="toolbar">
    <div class="counter">已選 <strong id="counter">0</strong> 項</div>
    <div>
      <button type="button" id="btn-expand-all">全部展開</button>
      <button type="button" id="btn-collapse-all">全部收合</button>
      <button type="button" id="btn-clear-all">全部清除</button>
    </div>
  </div>

  <div class="sections-grid" id="sections"></div>

  <!-- CARD-042：單次核定降級為文字提醒（114 JSON 無 max_per_approval 欄位，CARD-041 確認）-->
  <div class="single-approval-note">
    ⚠️ <strong>單次核定上限提醒</strong>：
    同一勾選批次建議不超過 1 組輔具組合送出（實際核定依照服務項目規定為準）。
    本介面不做自動限制，請個管師自行判斷。
  </div>
</div>

<div class="footer-bar">
  <div class="footer-bar-inner">
    <div class="sum">已選 <strong id="counter-bottom">0</strong> 項補助</div>
    <button id="next-btn" class="next-btn" type="button" disabled>下一步 →</button>
  </div>
</div>

<footer class="page-footer">
  <p>長照智慧諮詢 · 補助代碼選擇 · POC 版本</p>
</footer>

/* CARD-044：把 BB/BC/BD/C/G 5 區 prepend 到 CATS 之前（視覺上 B 系 → C → E 系 → F → G）。
   注入失敗 / 空陣列 → 不報錯，CATS 保持 9 族原樣。 */
try {
  const extraEl=document.getElementById("extra-sections");
  if(extraEl){
    const raw=extraEl.textContent||"[]";
    const extras=JSON.parse(raw);
    if(Array.isArray(extras)&&extras.length){
      // 正規化 entry 形狀（兼容 {id,name,items:[{c,n}]}）
      const normalized=extras.filter(s=>s&&s.id&&Array.isArray(s.items)).map(s=>({
        id:s.id, name:s.name||s.id,
        items:s.items.filter(i=>i&&i.c&&i.n).map(i=>({c:i.c,n:i.n}))
      }));
      // prepend：5 區放最前面，CATS 既有 EA-FA 接在後
      CATS.splice(0,0,...normalized);
    }
  }
}catch(e){/* swallow：CARD-044 注入失敗不影響 9 族 */}

/* CARD-042：status banner（URL query → tag 列） */
function renderStatusBanner(){
  const box=document.getElementById("status-banner");
  if(!box)return;
  const entries=[];
  if(P.cms)entries.push({label:"CMS",val:"第 "+P.cms+" 級"});
  if(P.income){
    const map={low:"低收入戶",mid_low:"中低收入戶",general:"一般戶"};
    entries.push({label:"收入別",val:map[P.income]||P.income});
  }
  if(P.city)entries.push({label:"縣市",val:P.city});
  if(P.zone)entries.push({label:"分區",val:"第 "+P.zone+" 類"});
  if(P.foreign_care){
    const fc=P.foreign_care==="true"||P.foreign_care==="1";
    entries.push({label:"外看",val:fc?"有":"無",warn:fc});
  }
  if(!entries.length){box.style.display="none";return;}
  box.style.display="flex";
  box.innerHTML="";
  entries.forEach(e=>{
    const tag=document.createElement("span");
    tag.className="sb-tag"+(e.warn?" warn":"");
    tag.innerHTML='<span class="sb-label">'+e.label+'</span>'+e.val;
    box.appendChild(tag);
  });
}

/* CARD-042：四色進度條（若 URL 帶 b*_quota 才顯示）*/
function renderQuotaBars(){
  const box=document.getElementById("quota-bars");
  const body=document.getElementById("quota-bars-body");
  if(!box||!body)return;
  const rows=[];
  ["b1","b2","b3","b4"].forEach(k=>{
    const quota=parseInt(P[k+"_quota"]||"",10);
    const used=parseInt(P[k+"_used"]||"0",10);
    const remaining=parseInt(P[k+"_remaining"]||"",10);
    if(isNaN(quota)||quota<=0)return;
    const pct=Math.max(0,Math.min(100,Math.round((used/quota)*100)));
    const over=used>quota;
    rows.push({k:k,quota:quota,used:used,remaining:isNaN(remaining)?(quota-used):remaining,pct:pct,over:over});
  });
  if(!rows.length){box.style.display="none";return;}
  box.style.display="block";
  body.innerHTML="";
  rows.forEach(r=>{
    const row=document.createElement("div");
    row.className="qb-row";
    const lbl=document.createElement("span");lbl.className="qb-label "+r.k;lbl.textContent=r.k.toUpperCase();
    const bar=document.createElement("span");bar.className="qb-bar";
    const fill=document.createElement("span");fill.className="qb-fill "+r.k+(r.over?" over":"");
    fill.style.width=(r.over?100:r.pct)+"%";
    bar.appendChild(fill);
    const nums=document.createElement("span");nums.className="qb-nums";
    nums.textContent=r.used.toLocaleString()+" / "+r.quota.toLocaleString()+"（剩 "+Math.max(0,r.remaining).toLocaleString()+"）";
    row.appendChild(lbl);row.appendChild(bar);row.appendChild(nums);
    body.appendChild(row);
  });
}

/* CARD-042：對每個 item 建單價 chip + （type=both 時）租賃 radio
   CARD-052：移除 service 型早 return；改為「price 缺/0 才不顯示」。
             service 型（BA/BB/BC/BD/C/G）顯示「$260/次」；buy 型保留「購 $1,200」；rent/both 既有邏輯不動。 */
function buildPriceRow(code){
  const m=ITEM_META[code];
  if(!m)return null;
  const row=document.createElement("div");
  row.className="price-row";
  const chip=document.createElement("span");
  chip.className="price-chip "+(m.type||"buy");
  chip.dataset.code=code;
  function chipText(mode){
    if(mode==="rent"&&m.rent_price!=null)return "租 $"+m.rent_price.toLocaleString()+"/月";
    if(m.price!=null)return "購 $"+m.price.toLocaleString();
    return "—";
  }
  if(m.type==="rent"){
    chip.textContent=(m.rent_price!=null)?"租 $"+m.rent_price.toLocaleString()+"/月":"租賃";
  }else if(m.type==="both"){
    chip.textContent=chipText("buy");
    rentChoice.set(code,"buy");
    const sw=document.createElement("span");
    sw.className="rent-switch";
    ["buy","rent"].forEach(mode=>{
      const lbl=document.createElement("label");
      const rd=document.createElement("input");
      rd.type="radio";rd.name="rent-"+code;rd.value=mode;
      if(mode==="buy")rd.checked=true;
      rd.addEventListener("change",()=>{
        if(rd.checked){
          rentChoice.set(code,mode);
          chip.textContent=chipText(mode);
        }
      });
      lbl.appendChild(rd);
      lbl.appendChild(document.createTextNode(mode==="buy"?"購":"租"));
      sw.appendChild(lbl);
    });
    row.appendChild(chip);
    row.appendChild(sw);
    return row;
  }else if(m.type==="service"){
    // CARD-052：service 型（BA/BB/BC/BD/C/G）顯示「$260/次」；price 缺/0 → 不顯示（graceful）
    if(!(m.price&&m.price>0))return null;
    chip.textContent="$"+m.price.toLocaleString()+(m.unit?"/"+m.unit:"");
  }else{
    // type=buy（or fallback）：CARD-052 加 price>0 守門避免顯示「購 $0」
    if(!(m.price&&m.price>0))return null;
    chip.textContent="購 $"+m.price.toLocaleString();
  }
  row.appendChild(chip);
  return row;
}

function getQueryBaseUrl(){
  try {
    var el = document.getElementById("query-base-url");
    if (!el) return "";
    return JSON.parse(el.textContent || '""');
  } catch(e) { return ""; }
}

function render(){
  const root=document.getElementById("sections");
  CATS.forEach(cat=>{
    const sec=document.createElement("div");sec.className="sec";sec.setAttribute("data-fam",cat.id);
    const secHdr=document.createElement("div");secHdr.className="sec-header";
    const h2=document.createElement("h2");h2.textContent=cat.name;
    const secActions=document.createElement("div");secActions.className="sec-actions";
    const btnAll=document.createElement("button");btnAll.type="button";btnAll.textContent="全選";
    const btnNone=document.createElement("button");btnNone.type="button";btnNone.textContent="清除";
    secActions.appendChild(btnAll);secActions.appendChild(btnNone);
    const secCount=document.createElement("span");secCount.className="sec-count";secCount.textContent="0 / "+cat.items.length;
    secHdr.appendChild(h2);secHdr.appendChild(secActions);secHdr.appendChild(secCount);
    sec.appendChild(secHdr);
    const items=document.createElement("div");items.className="items";
    cat.items.forEach(it=>{
      const label=document.createElement("label");label.className="itm";label.setAttribute("data-code",it.c);
      const cb=document.createElement("input");cb.type="checkbox";cb.value=it.c;
      const body=document.createElement("div");body.className="i-body";
      const name=document.createElement("div");name.className="i-name";name.textContent=it.n;
      const code=document.createElement("div");code.className="i-code";code.textContent=it.c;
      body.appendChild(name);body.appendChild(code);
      /* CARD-042：租賃 / 單價 chip（僅在 ITEM_META 有資料時顯示）*/
      const pr=buildPriceRow(it.c);
      if(pr)body.appendChild(pr);
      label.appendChild(cb);label.appendChild(body);
      cb.addEventListener("change",()=>{
        if(cb.checked){state.add(it.c);label.classList.add("checked");}
        else{state.delete(it.c);label.classList.remove("checked");}
        updateCounter();updateSectionCounts();
      });
      items.appendChild(label);
    });
    sec.appendChild(items);
    btnAll.addEventListener("click",()=>{
      items.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
        if(!cb.checked){cb.checked=true;cb.dispatchEvent(new Event("change"));}
      });
    });
    btnNone.addEventListener("click",()=>{
      items.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
        if(cb.checked){cb.checked=false;cb.dispatchEvent(new Event("change"));}
      });
    });
    root.appendChild(sec);
  });
}

function updateCounter(){
  const n=state.size;
  document.getElementById("counter").textContent=String(n);
  document.getElementById("counter-bottom").textContent=String(n);
  document.getElementById("next-btn").disabled=(n===0);
}

function updateSectionCounts(){
  CATS.forEach(cat=>{
    const sec=document.querySelector('.sec[data-fam="'+cat.id+'"]');
    if(!sec)return;
    const count=cat.items.filter(it=>state.has(it.c)).length;
    const el=sec.querySelector(".sec-count");
    el.textContent=count+" / "+cat.items.length;
    el.classList.toggle("has",count>0);
  });
}

function buildQueryUrl(){
  const base=getQueryBaseUrl();
  if(!base)return "";
  const codes=Array.from(state).join(",");
  const qs=new URLSearchParams();
  qs.set("codes",codes);
  if(P.user_id)qs.set("user_id",P.user_id);
  if(P.session)qs.set("session",P.session);
  if(P.channel)qs.set("channel",P.channel);
  if(P.guild)qs.set("guild",P.guild);
  // CARD-035：把 webhook / issued_at 帶給 Web B
  if(P.webhook)qs.set("webhook",P.webhook);
  if(P.issued_at)qs.set("issued_at",P.issued_at);
  const sep=base.indexOf("?")>=0?"&":"?";
  return base+sep+qs.toString();
}

// expose for unit test hook（test 環境無 window 仍可 import）
window.__CARD034_buildQueryUrl=buildQueryUrl;
window.__CARD034_state=state;
window.__CARD034_CATS=CATS;

document.getElementById("btn-expand-all").addEventListener("click",()=>{
  document.querySelectorAll(".items").forEach(el=>el.style.maxHeight="none");
});
document.getElementById("btn-collapse-all").addEventListener("click",()=>{
  document.querySelectorAll(".items").forEach(el=>el.style.maxHeight="260px");
});
document.getElementById("btn-clear-all").addEventListener("click",()=>{
  document.querySelectorAll('.itm input[type="checkbox"]').forEach(cb=>{
    if(cb.checked){cb.checked=false;cb.dispatchEvent(new Event("change"));}
  });
});
document.getElementById("next-btn").addEventListener("click",()=>{
  const url=buildQueryUrl();
  if(!url){alert("尚未設定 Web B 目標 URL");return;}
  window.location.href=url;
});

parseParams();renderStatusBanner();renderQuotaBars();render();updateCounter();updateSectionCounts();
</script>
